<!DOCTYPE html>
<html lang="pt-BR">
<head>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--az:#2934CB;--azd:#1e26a0;--azl:rgba(41,52,203,0.12);--vd:#2DEC99;--vdd:#1db87a;--vdl:rgba(45,236,153,0.12);--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;--bo:rgba(255,255,255,0.07);--bo2:rgba(255,255,255,0.14);--tx:#f0f0f0;--tx2:#8888a0;--tx3:#4a4a5a;--red:#ff4d4d;--amb:#f5a623;--r:10px;--rs:7px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:"Space Grotesk",sans-serif;font-size:15px;min-height:100vh}
input,select,textarea,button{font-family:"Space Grotesk",sans-serif}
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 60% 50% at 20% 50%,rgba(41,52,203,0.25) 0%,transparent 70%),var(--bg)}
.lw{display:flex;width:100%;max-width:880px;min-height:500px;border-radius:20px;overflow:hidden;box-shadow:0 60px 120px rgba(0,0,0,0.6)}
.ll{flex:1;background:var(--az);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;position:relative;overflow:hidden}
.ll::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 30% 70%,rgba(45,236,153,0.2) 0%,transparent 60%)}
.llc{position:relative;z-index:1;text-align:center}
.lb{font-size:40px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1;margin-top:20px}
.lbs{font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:3px;text-transform:uppercase;margin-top:8px}
.ltg{font-size:12px;color:rgba(255,255,255,0.45);margin-top:28px;line-height:1.7;max-width:220px}
.lr{flex:1;background:var(--bg2);display:flex;flex-direction:column;justify-content:center;padding:48px}
.lt{font-size:22px;font-weight:700;margin-bottom:5px}
.lsb{font-size:13px;color:var(--tx2);margin-bottom:28px}
.ff{margin-bottom:15px}
.ff label{display:block;font-size:10px;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.ff input{width:100%;background:var(--bg3);border:1.5px solid var(--bo);border-radius:var(--rs);color:var(--tx);padding:11px 13px;font-size:14px;outline:none;transition:border-color .2s}
.ff input:focus{border-color:var(--az)}
.btnl{width:100%;background:var(--az);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:6px}

.lerr{color:var(--red);font-size:13px;margin-top:10px;display:none}
.cfgh{background:var(--bg3);border:1px solid var(--bo);border-radius:var(--rs);padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--tx2);line-height:1.6}
#app{display:none;flex-direction:column;min-height:100vh}
.tb{background:var(--bg2);border-bottom:1px solid var(--bo);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.tbn{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
.tb-r{display:flex;align-items:center;gap:10px}
.upill{background:var(--bg3);border:1px solid var(--bo);border-radius:20px;padding:4px 11px 4px 7px;display:flex;align-items:center;gap:7px;font-size:12px}

.avm{background:var(--az)}.avt{background:var(--vdd)}
.bpf{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700}
.bpm{background:var(--azl);color:var(--az);border:1px solid rgba(41,52,203,.3)}
.bpt{background:var(--vdl);color:var(--vdd);border:1px solid rgba(45,236,153,.3)}
.bout{background:none;border:1px solid var(--bo);color:var(--tx2);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:11px}

.ab{display:flex;flex:1;overflow:hidden;height:calc(100vh - 54px)}
.sb{width:210px;background:var(--bg2);border-right:1px solid var(--bo);padding:16px 10px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;overflow-y:auto}
.ss{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);padding:10px 9px 5px;font-weight:700}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);font-size:12px;color:var(--tx2);cursor:pointer;transition:all .15s;font-weight:500}

.si{background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:7px 12px;border-radius:var(--rs);font-size:12px;outline:none;flex:1;min-width:150px}

.fi{background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:7px 10px;border-radius:var(--rs);font-size:12px;outline:none;cursor:pointer}

.card{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:18px}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);font-weight:700;margin-bottom:13px}
.tw{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 13px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);border-bottom:1px solid var(--bo);font-weight:700;white-space:nowrap;background:var(--bg3)}
tbody td{padding:10px 13px;border-bottom:1px solid var(--bo);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.015)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bvd{background:var(--vdl);color:var(--vdd);border:1px solid rgba(45,236,153,.25)}
.baz{background:var(--azl);color:#6b76e8;border:1px solid rgba(41,52,203,.25)}
.bam{background:rgba(245,166,35,.12);color:var(--amb);border:1px solid rgba(245,166,35,.25)}
.brd{background:rgba(255,77,77,.12);color:var(--red);border:1px solid rgba(255,77,77,.25)}

.btn{padding:7px 14px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.bsm{padding:4px 9px;font-size:11px}
.baz2{background:var(--az);color:#fff}.baz2:hover{background:var(--azd)}
.bvd2{background:var(--vd);color:#000}.bvd2:hover{background:var(--vdd)}
.bgh{background:var(--bg3);color:var(--tx);border:1px solid var(--bo)}.bgh:hover{border-color:var(--bo2)}
.bdr{background:rgba(255,77,77,.1);color:var(--red);border:1px solid rgba(255,77,77,.2)}.bdr:hover{background:rgba(255,77,77,.2)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bo2);border-radius:16px;padding:26px;width:100%;max-width:580px;margin:auto}
.mlg{max-width:700px}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mtl{font-size:17px;font-weight:700}
.mcl{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;line-height:1;padding:2px}.mcl:hover{color:var(--tx)}
.mf{margin-bottom:13px}
.mf label{display:block;font-size:10px;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.mf input,.mf select,.mf textarea{width:100%;background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:9px 11px;border-radius:var(--rs);font-size:13px;outline:none}
.mf textarea{resize:vertical;min-height:70px}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--az)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.mft{display:flex;gap:9px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--bo)}
.fsec{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--az);font-weight:700;margin:16px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--azl)}
.pc{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:16px;transition:border-color .2s}
.pc:hover{border-color:var(--bo2);background:var(--bg3)}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.chip{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--bo);color:var(--tx2)}
.chip.done{background:var(--vdl);border-color:rgba(45,236,153,.3);color:var(--vdd)}
.chip.prog{background:var(--azl);border-color:rgba(41,52,203,.3);color:#6b76e8}
.loading{text-align:center;padding:50px;color:var(--tx2)}
.spin{width:28px;height:28px;border:2.5px solid var(--bo);border-top-color:var(--az);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.pag{display:flex;gap:4px;align-items:center;justify-content:flex-end;margin-top:12px}
.pb{background:var(--bg2);border:1px solid var(--bo);color:var(--tx2);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-family:"Space Grotesk",sans-serif}
.pb:hover{border-color:var(--bo2);color:var(--tx)}
.pb.act{background:var(--az);color:#fff;border-color:var(--az)}
.pi{font-size:11px;color:var(--tx2);margin-left:4px}
.ntf{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px}
.nti{background:var(--bg3);border:1px solid var(--bo2);border-radius:var(--rs);padding:11px 15px;font-size:12px;max-width:300px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:sli .3s ease}
.nti.ok{border-left:3px solid var(--vd)}.nti.err{border-left:3px solid var(--red)}
@keyframes sli{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.cmw{background:var(--bg2);border:1px solid var(--bo2);border-radius:16px;padding:26px;width:100%;max-width:400px;margin:auto;text-align:center}
.cmi{font-size:36px;margin-bottom:12px}
.cmt{font-size:17px;font-weight:700;margin-bottom:8px}
.cmm{font-size:13px;color:var(--tx2);margin-bottom:20px;line-height:1.6}
.cmb{display:flex;gap:10px;justify-content:center}
.hbox{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:20px;margin-bottom:14px}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bo)}
.hrow:last-child{border-bottom:none}
@media(max-width:768px){.c4{grid-template-columns:repeat(2,1fr)}.c3{grid-template-columns:1fr 1fr}.sb{display:none}.ma{padding:14px}.mg{grid-template-columns:1fr}.cg2{grid-template-columns:1fr}.cg3{grid-template-columns:1fr}.lw{flex-direction:column;max-width:420px}.ll{padding:28px;min-height:180px}}
</style>
</head>

<script>
var SH = {g:'1MWlcTXGY4y8x52k6jBGejQfygR4gIUqLoQSEa_9hp0g', t:'1Npgou9881i6JIyEH4MEOsXPz2Iwjutc2fGWVub74aFQ'};
var MASTERS = ['andreia@hyzi.com.br','gustavo@hyzi.com.br','gusizidro@gmail.com'];
var TOK=null, USR=null, C={}, _pg={}, _ch={};

function ntf(m,t) {
  t = t||'ok';
  var e=document.createElement('div');
  e.className='nti '+t;
  e.textContent=(t==='ok'?'check ':' x ')+m;
  document.getElementById('ntf').appendChild(e);
  setTimeout(function(){e.remove()},3500);
}
function setM(h){document.getElementById('ma').innerHTML=h}
function gv(id){var el=document.getElementById(id);return el?el.value||'':\'\'}
function abrir(id){document.getElementById(id).classList.add('open')}
function fechar(id){document.getElementById(id).classList.remove('open')}

function fR(v){
  var n=parseFloat(String(v).replace(',','.'))||0;
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function excelToDate(v){
  if(!v||v==='') return null;
  var s=String(v).trim();
  if(s.length>=4 && s.length<=5 && /^[0-9]+$/.test(s)){
    var d=new Date((parseInt(s)-25569)*86400000);
    return isNaN(d.getTime())?null:d;
  }
  var d=new Date(s.indexOf('T')>0?s:s+'T12:00:00');
  return isNaN(d.getTime())?null:d;
}
function fD(v){
  var d=excelToDate(v);
  if(!d) return v||'--';
  return d.toLocaleDateString('pt-BR');
}
function filtroPer(v, meses){
  if(!meses||meses==='all') return true;
  var d=excelToDate(v);
  if(!d) return false;
  var lim=new Date();
  lim.setMonth(lim.getMonth()-parseInt(meses));
  return d>=lim;
}
function today(){return new Date().toISOString().split('T')[0]}
function cl(n){return n<26?String.fromCharCode(65+n):'A'+String.fromCharCode(65+n-26)}
function pgArr(arr,p,n){
  n=n||20;
  return {items:arr.slice((p-1)*n,p*n), total:Math.ceil(arr.length/n)};
}
function pgHtml(tot,p,fn){
  if(tot<=1) return '';
  var h='<div class="pag">';
  if(p>1) h+='<button class="pb" onclick="'+fn+'('+(p-1)+')">&#8592;</button>';
  for(var i=Math.max(1,p-2);i<=Math.min(tot,p+2);i++){
    h+='<button class="pb'+(i===p?' act':'')+'" onclick="'+fn+'('+i+')">'+i+'</button>';
  }
  if(p<tot) h+='<button class="pb" onclick="'+fn+'('+(p+1)+')">&#8594;</button>';
  h+='<span class="pi">Pg '+p+'/'+tot+'</span></div>';
  return h;
}

function bSt(s){
  var t=(s||'').toLowerCase();
  if(t.indexOf('conclu')>=0||t.indexOf('finaliz')>=0||t.indexOf('entregue')>=0)
    return '<span class="badge bvd">'+(s||'Concluido')+'</span>';
  if(t.indexOf('andamento')>=0)
    return '<span class="badge baz">'+s+'</span>';
  if(t.indexOf('parali')>=0||t.indexOf('paus')>=0||t.indexOf('medir')>=0)
    return '<span class="badge bam">'+s+'</span>';
  return '<span class="badge bgr">'+(s||'Nao iniciado')+'</span>';
}
function bPr(s){
  if(s==='Aceita') return '<span class="badge bvd">'+s+'</span>';
  if(s==='Pendente') return '<span class="badge bam">'+s+'</span>';
  if(s==='Rejeitada') return '<span class="badge brd">'+s+'</span>';
  return '<span class="badge bgr">'+(s||'--')+'</span>';
}

async function sGet(id,ab){
  var k=id+ab;
  if(C[k]) return C[k];
  var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+id+'/values/'+encodeURIComponent(ab),
    {headers:{Authorization:'Bearer '+TOK}});
  var d=await r.json();
  if(d.error) throw new Error(d.error.message);
  C[k]=d.values||[];
  return C[k];
}
async function sApp(id,ab,v){
  var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+id+'/values/'+encodeURIComponent(ab)+':append?valueInputOption=USER_ENTERED',
    {method:'POST',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},
     body:JSON.stringify({values:v})});
  var d=await r.json();
  if(d.error) throw new Error(d.error.message);
  delete C[id+ab];
}
async function sUpd(id,ab,rng,v){

async function sDel(id,shId,rowIdx){
  var body={requests:[{deleteDimension:{range:{sheetId:shId,dimension:'ROWS',startIndex:rowIdx-1,endIndex:rowIdx}}}]};
  var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+id+':batchUpdate',
    {method:'POST',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},
     body:JSON.stringify(body)});
  var d=await r.json();
  if(d.error) throw new Error(d.error.message);
}
async function getShId(sid,name){

  var sh=(d.sheets||[]).find(function(s){return s.properties.title===name});

function r2o(rows){
  if(!rows||rows.length<2) return [];
  var h=rows[0];
  return rows.slice(1).map(function(r,i){
    var o={_row:i+2};
    h.forEach(function(k,j){o[k?k.trim():j]=r[j]||''});
    return o;
  });
}
async function nxtId(id,ab,col){

}

PGS.fin = async function(){

  var taxa=prop.length>0?Math.round(nAc/prop.length*100):0;

      var v=parseFloat(p['VALOR E'+i])||0;

        var s=(p['STATUS E'+i]||'').toLowerCase();
        etapas.push({obra:p['NOME OBRA'],et:p['ETAPA '+i]||'E'+i,v:v,st:p['STATUS E'+i]||'',ok:s.indexOf('conclu')>=0});
      }
    }

  });

    '<div class="fb">'+
      '<span class="fbl">Filtros:</span>'+

      '<select class="fi" onchange="_pg.fst=this.value;PGS.fin()"><option value="">Todos status</option><option '+(stf==='Aceita'?'selected':'')+'>Aceita</option><option '+(stf==='Pendente'?'selected':'')+'>Pendente</option><option '+(stf==='Rejeitada'?'selected':'')+'>Rejeitada</option></select>'+
    '</div>'+

      '<div class="sc" style="--acc:var(--vd)"><div class="sl">Receita contratada</div><div class="sv svd" style="font-size:18px">'+fR(rAc)+'</div><div class="ss2">'+nAc+' contratos</div></div>'+
      '<div class="sc" style="--acc:var(--az)"><div class="sl">A receber (etapas)</div><div class="sv saz" style="font-size:18px">'+fR(ar)+'</div><div class="ss2">Pendente entrega</div></div>'+
      '<div class="sc" style="--acc:var(--amb)"><div class="sl">Em negociacao</div><div class="sv sam" style="font-size:18px">'+fR(rPd)+'</div></div>'+
      '<div class="sc" style="--acc:#6b76e8"><div class="sl">Ticket medio</div><div class="sv" style="color:#6b76e8;font-size:18px">'+fR(tick)+'</div><div class="ss2">Taxa: '+taxa+'%</div></div>'+

      '<div class="cc"><div class="cct">Distribuicao</div><div class="dw"><canvas id="ch-fin-pr"></canvas></div>'+
        '<div class="leg"><div class="lgi"><div class="lgd" style="background:#2DEC99"></div>Aceitas: '+fR(rAc)+'</div><div class="lgi"><div class="lgd" style="background:#f5a623"></div>Pendentes: '+fR(rPd)+'</div><div class="lgi"><div class="lgd" style="background:#ff4d4d"></div>Rejeitadas: '+fR(rRj)+'</div></div>'+
      '</div>'+

      '<div class="mf"><label>Qtd etapas</label><select id="prne" onchange="togEt(this.value)">'+[1,2,3,4,5,6].map(function(n){return '<option '+(n===ne?'selected':'')+'>'+n+'</option>'}).join('')+'</select></div>'+
    '</div>'+
    '<div class="mg"><div class="mf"><label>Valor total (R$)</label><input id="prv" type="number" value="'+(p?p['VALOR']||'':'')+'" step="0.01"></div><div class="mf"><label>Forma pagto</label><input id="prpg" type="text" value="'+(p?p['FORMA PAGTO']||'':'')+'" placeholder="80% entrega + 20% aprovacao"></div></div>'+
    etH+
    '<div class="mft"><button class="btn bgh" onclick="fechar('ov-proj')">Cancelar</button><button class="btn baz2" onclick="salvPr('+(p?p._row:'null')+')">Salvar Projeto</button></div>';
  window._ep=p;
  abrir('ov-proj');
}
function togEt(n){for(var i=1;i<=6;i++){var el=document.getElementById('eb'+i);if(el)el.style.display=i<=parseInt(n)?'':'none'}}
async function salvPr(row){
  var ne=parseInt(gv('prne'))||1;
  var vals=[gv('prp'),gv('prpr'),gv('prd'),gv('pro'),gv('pri'),gv('prf'),gv('prst'),gv('prcc'),gv('prc'),gv('prpg'),ne,gv('prv')||0];
  for(var i=1;i<=6;i++) vals.push(gv('en'+i));
  for(var i=1;i<=6;i++) vals.push(gv('ed'+i));
  for(var i=1;i<=6;i++) vals.push(gv('ev'+i)||0);
  for(var i=1;i<=6;i++) vals.push(gv('es'+i));
  for(var i=1;i<=6;i++) vals.push(gv('ep'+i));
  try{
    if(row&&row!=='null') await sUpd(SH.g,'Cadastro_Projetos','B'+row+':AM'+row,[vals]);
    else{var id=await nxtId(SH.g,'Cadastro_Projetos','ID');await sApp(SH.g,'Cadastro_Projetos',[[id].concat(vals)])}
    fechar('ov-proj');ntf('Projeto salvo!');PGS.proj();
  }catch(e){ntf('Erro ao salvar.','err');console.error(e)}
}
async function delPr(row,nome){
  confirmar('Excluir Projeto','Excluir o projeto '+nome+'?',async function(){
    try{var sid=await getShId(SH.g,'Cadastro_Projetos');await sDel(SH.g,sid,row);delete C[SH.g+'Cadastro_Projetos'];ntf('Excluido!');PGS.proj()}catch(e){ntf('Erro.','err')}
  });
}

async function editUsrRow(row){
  var rows=await sGet(SH.g,'Cadastro_Usuarios');
  var u=r2o(rows).find(function(x){return x._row===row});
  if(!u) return;
  document.getElementById('mf-usr').innerHTML='<div class="mhd"><div class="mtl">Editar Usuario</div><button class="mcl" onclick="fechar('ov-usr')">x</button></div>'+
    '<div class="mg"><div class="mf"><label>Nome</label><input id="unn" type="text" value="'+(u['Nome']||'')+'"></div><div class="mf"><label>E-mail</label><input id="une" type="email" value="'+(u['E-mail']||'')+'"></div></div>'+
    '<div class="mg"><div class="mf"><label>Telefone</label><input id="unt" type="text" value="'+(u['Telefone']||'')+'"></div><div class="mf"><label>Data entrada</label><input id="und" type="date" value="'+(u['Data Entrada']?String(u['Data Entrada']).split('T')[0]:'')+'"></div></div>'+
    '<div class="mg"><div class="mf"><label>R$/hora</label><input id="unh" type="number" value="'+(u['Valor Hora Tecnica']||u['Valor Hora Técnica']||0)+'" step="0.01"></div><div class="mf"><label>Senha</label><input id="uns" type="text" value="'+(u['Senha']||'')+'"></div></div>'+
    '<div class="mf"><label>Endereco</label><input id="unad" type="text" value="'+(u['Endereco']||u['Endereço']||'')+'"></div>'+
    '<div class="mft"><button class="btn bgh" onclick="fechar('ov-usr')">Cancelar</button><button class="btn baz2" onclick="salvUsr('+row+')">Salvar</button></div>';
  abrir('ov-usr');
}
async function salvUsr(row){
  var vals=[gv('unn'),gv('une'),gv('unt'),gv('unad'),gv('und'),gv('unh')||0,gv('uns')];
  try{
    if(row) await sUpd(SH.g,'Cadastro_Usuarios','B'+row+':H'+row,[vals]);
    else{var id=await nxtId(SH.g,'Cadastro_Usuarios','ID Usuario');await sApp(SH.g,'Cadastro_Usuarios',[[id].concat(vals)])}
    fechar('ov-usr');ntf('Usuario salvo!');PGS.eq();
  }catch(e){ntf('Erro.','err');console.error(e)}
}
