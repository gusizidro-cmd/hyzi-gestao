<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyzi Engenharia</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--az:#2934CB;--azd:#1e26a0;--azl:rgba(41,52,203,0.12);--vd:#2DEC99;--vdd:#1db87a;--vdl:rgba(45,236,153,0.12);--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;--bo:rgba(255,255,255,0.07);--bo2:rgba(255,255,255,0.14);--tx:#f0f0f0;--tx2:#8888a0;--tx3:#4a4a5a;--red:#ff4d4d;--amb:#f5a623;--r:10px;--rs:7px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Space Grotesk',sans-serif;font-size:15px;min-height:100vh}
input,select,textarea,button{font-family:'Space Grotesk',sans-serif}
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 60% 50% at 20% 50%,rgba(41,52,203,0.25) 0%,transparent 70%),var(--bg)}
.lw{display:flex;width:100%;max-width:880px;min-height:500px;border-radius:20px;overflow:hidden;box-shadow:0 60px 120px rgba(0,0,0,0.6)}
.ll{flex:1;background:var(--az);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;position:relative;overflow:hidden}
.ll::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 70%,rgba(45,236,153,0.2) 0%,transparent 60%)}
.llc{position:relative;z-index:1;text-align:center}
.lb{font-size:40px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1;margin-top:20px}
.lbs{font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:3px;text-transform:uppercase;margin-top:8px}
.ltg{font-size:12px;color:rgba(255,255,255,0.45);margin-top:28px;line-height:1.7;max-width:220px}
.lr{flex:1;background:var(--bg2);display:flex;flex-direction:column;justify-content:center;padding:48px}
.lt{font-size:22px;font-weight:700;margin-bottom:5px}
.lsb{font-size:13px;color:var(--tx2);margin-bottom:28px}
.ff{margin-bottom:15px}
.ff label{display:block;font-size:10px;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.ff input{width:100%;background:var(--bg3);border:1.5px solid var(--bo);border-radius:var(--rs);color:var(--tx);padding:11px 13px;font-size:14px;outline:none;transition:border-color .2s}
.ff input:focus{border-color:var(--az)}
.btnl{width:100%;background:var(--az);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:6px}
.btnl:hover{background:var(--azd)}
.lerr{color:var(--red);font-size:13px;margin-top:10px;display:none}
.cfgh{background:var(--bg3);border:1px solid var(--bo);border-radius:var(--rs);padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--tx2);line-height:1.6}
#app{display:none;flex-direction:column;min-height:100vh}
.tb{background:var(--bg2);border-bottom:1px solid var(--bo);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.tbn{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
.tb-r{display:flex;align-items:center;gap:10px}
.upill{background:var(--bg3);border:1px solid var(--bo);border-radius:20px;padding:4px 11px 4px 7px;display:flex;align-items:center;gap:7px;font-size:12px}
.uav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.avm{background:var(--az)}.avt{background:var(--vdd)}
.bpf{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700}
.bpm{background:var(--azl);color:var(--az);border:1px solid rgba(41,52,203,.3)}
.bpt{background:var(--vdl);color:var(--vdd);border:1px solid rgba(45,236,153,.3)}
.bout{background:none;border:1px solid var(--bo);color:var(--tx2);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:11px}
.bout:hover{border-color:var(--bo2);color:var(--tx)}
.ab{display:flex;flex:1;overflow:hidden;height:calc(100vh - 54px)}
.sb{width:210px;background:var(--bg2);border-right:1px solid var(--bo);padding:16px 10px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;overflow-y:auto}
.ss{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);padding:10px 9px 5px;font-weight:700}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);font-size:12px;color:var(--tx2);cursor:pointer;transition:all .15s;font-weight:500}
.ni:hover{background:var(--bg3);color:var(--tx)}
.ni.active{background:var(--azl);color:var(--az);border:1px solid rgba(41,52,203,.2)}
.ma{flex:1;overflow-y:auto;padding:24px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.pt{font-size:20px;font-weight:700;letter-spacing:-.3px}
.pt span{color:var(--tx2);font-size:14px;font-weight:400;margin-left:7px}
.pa{display:flex;gap:7px;flex-wrap:wrap}
.stats{display:grid;gap:13px;margin-bottom:20px}
.c4{grid-template-columns:repeat(4,1fr)}.c3{grid-template-columns:repeat(3,1fr)}.c2{grid-template-columns:repeat(2,1fr)}
.sc{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:16px 18px}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);font-weight:700;margin-bottom:7px}
.sv{font-size:26px;font-weight:700;line-height:1;letter-spacing:-1px}
.saz{color:var(--az)}.svd{color:var(--vd)}.srd{color:var(--red)}.sam{color:var(--amb)}.swh{color:var(--tx)}
.ss2{font-size:11px;color:var(--tx2);margin-top:4px}
.cg{display:grid;gap:14px;margin-bottom:20px}
.cg2{grid-template-columns:repeat(2,1fr)}.cg3{grid-template-columns:2fr 1fr}
.cc{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:18px}
.cct{font-size:12px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chw{position:relative;height:180px}
.dw{position:relative;height:160px;display:flex;align-items:center;justify-content:center}
.dc{position:absolute;text-align:center;pointer-events:none}
.dcv{font-size:22px;font-weight:700}
.dcl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.lgi{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
.lgd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fb{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:12px 14px;margin-bottom:14px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.fbl{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);font-weight:700;white-space:nowrap}
.si{background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:7px 12px;border-radius:var(--rs);font-size:12px;outline:none;flex:1;min-width:150px}
.si:focus{border-color:var(--az)}
.fi{background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:7px 10px;border-radius:var(--rs);font-size:12px;outline:none;cursor:pointer}
.fi:focus{border-color:var(--az)}
.card{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:18px}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);font-weight:700;margin-bottom:13px}
.tw{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 13px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);border-bottom:1px solid var(--bo);font-weight:700;white-space:nowrap;background:var(--bg3)}
tbody td{padding:10px 13px;border-bottom:1px solid var(--bo);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.015)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bvd{background:var(--vdl);color:var(--vdd);border:1px solid rgba(45,236,153,.25)}
.baz{background:var(--azl);color:#6b76e8;border:1px solid rgba(41,52,203,.25)}
.bam{background:rgba(245,166,35,.12);color:var(--amb);border:1px solid rgba(245,166,35,.25)}
.brd{background:rgba(255,77,77,.12);color:var(--red);border:1px solid rgba(255,77,77,.25)}
.bgr{background:rgba(255,255,255,.06);color:var(--tx2);border:1px solid var(--bo)}
.btn{padding:7px 14px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.bsm{padding:4px 9px;font-size:11px}
.baz2{background:var(--az);color:#fff}.baz2:hover{background:var(--azd)}
.bvd2{background:var(--vd);color:#000}.bvd2:hover{background:var(--vdd)}
.bgh{background:var(--bg3);color:var(--tx);border:1px solid var(--bo)}.bgh:hover{border-color:var(--bo2)}
.bdr{background:rgba(255,77,77,.1);color:var(--red);border:1px solid rgba(255,77,77,.2)}.bdr:hover{background:rgba(255,77,77,.2)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bo2);border-radius:16px;padding:26px;width:100%;max-width:580px;margin:auto}
.mlg{max-width:700px}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mtl{font-size:17px;font-weight:700}
.mcl{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;line-height:1;padding:2px}.mcl:hover{color:var(--tx)}
.mf{margin-bottom:13px}
.mf label{display:block;font-size:10px;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.mf input,.mf select,.mf textarea{width:100%;background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:9px 11px;border-radius:var(--rs);font-size:13px;outline:none}
.mf textarea{resize:vertical;min-height:70px}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--az)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.mft{display:flex;gap:9px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--bo)}
.fsec{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--az);font-weight:700;margin:16px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--azl)}
.pc{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:16px;transition:border-color .2s}
.pc:hover{border-color:var(--bo2);background:var(--bg3)}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.chip{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--bo);color:var(--tx2)}
.chip.done{background:var(--vdl);border-color:rgba(45,236,153,.3);color:var(--vdd)}
.chip.prog{background:var(--azl);border-color:rgba(41,52,203,.3);color:#6b76e8}
.loading{text-align:center;padding:50px;color:var(--tx2)}
.spin{width:28px;height:28px;border:2.5px solid var(--bo);border-top-color:var(--az);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.pag{display:flex;gap:4px;align-items:center;justify-content:flex-end;margin-top:12px}
.pb{background:var(--bg2);border:1px solid var(--bo);color:var(--tx2);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px}
.pb:hover{border-color:var(--bo2);color:var(--tx)}
.pb.act{background:var(--az);color:#fff;border-color:var(--az)}
.pi{font-size:11px;color:var(--tx2);margin-left:4px}
.ntf{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px}
.nti{background:var(--bg3);border:1px solid var(--bo2);border-radius:var(--rs);padding:11px 15px;font-size:12px;max-width:300px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:sli .3s ease}
.nti.ok{border-left:3px solid var(--vd)}.nti.err{border-left:3px solid var(--red)}
@keyframes sli{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.cmw{background:var(--bg2);border:1px solid var(--bo2);border-radius:16px;padding:26px;width:100%;max-width:400px;margin:auto;text-align:center}
.cmi{font-size:36px;margin-bottom:12px}
.cmt{font-size:17px;font-weight:700;margin-bottom:8px}
.cmm{font-size:13px;color:var(--tx2);margin-bottom:20px;line-height:1.6}
.cmb{display:flex;gap:10px;justify-content:center}
.hbox{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:20px;margin-bottom:14px}
@media(max-width:768px){.c4{grid-template-columns:repeat(2,1fr)}.c3{grid-template-columns:1fr 1fr}.sb{display:none}.ma{padding:14px}.mg{grid-template-columns:1fr}.cg2{grid-template-columns:1fr}.cg3{grid-template-columns:1fr}.lw{flex-direction:column;max-width:420px}.ll{padding:28px;min-height:180px}}
</style>
</head>
<body>
<div class="ntf" id="ntf"></div>
<div id="ls">
  <div class="lw" id="lwrap">
    <div class="ll">
      <div class="llc">
        <svg width="50" height="50" viewBox="0 0 60 60"><polygon points="10,0 30,30 10,60 0,60 0,0" fill="rgba(255,255,255,.92)"/><polygon points="50,0 60,0 60,60 50,60 30,30" fill="rgba(255,255,255,.92)"/></svg>
        <div class="lb">Hyzi</div>
        <div class="lbs">Engenharia</div>
        <div class="ltg">Sistema de Gestao e Acompanhamento de Projetos</div>
      </div>
    </div>
    <div class="lr">
      <div class="lt">Bem-vindo</div>
      <div class="lsb">Entre com suas credenciais</div>
      <div class="ff"><label>E-mail</label><input type="email" id="le" placeholder="seu@hyzi.com.br"/></div>
      <div class="ff"><label>Senha</label><input type="password" id="lpw" placeholder="..."/></div>
      <button class="btnl" onclick="doLogin()">Entrar</button>
      <div class="lerr" id="lerr"></div>
    </div>
  </div>
</div>
<div id="app">
  <div class="tb">
    <div style="display:flex;align-items:center;gap:10px">
      <svg width="20" height="20" viewBox="0 0 60 60"><polygon points="10,0 30,30 10,60 0,60 0,0" fill="#2934CB"/><polygon points="50,0 60,0 60,60 50,60 30,30" fill="#2934CB"/></svg>
      <span class="tbn">Hyzi Engenharia</span>
    </div>
    <div class="tb-r">
      <div class="upill"><div class="uav" id="uav"></div><span id="unm"></span><span class="bpf" id="ubp"></span></div>
      <button class="bout" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="ab">
    <div class="sb" id="sb"></div>
    <div class="ma" id="ma"><div class="loading"><div class="spin"></div>Carregando...</div></div>
  </div>
</div>
<div class="ov" id="ov-emp"><div class="modal" id="mf-emp"></div></div>
<div class="ov" id="ov-prop"><div class="modal" id="mf-prop"></div></div>
<div class="ov" id="ov-proj"><div class="modal mlg" id="mf-proj"></div></div>
<div class="ov" id="ov-usr"><div class="modal" id="mf-usr"></div></div>
<div class="ov" id="ov-cm"><div class="cmw" id="mf-cm"></div></div>
<script>

var SH={g:'1MWlcTXGY4y8x52k6jBGejQfygR4gIUqLoQSEa_9hp0g'};
var MASTERS=['andreia@hyzi.com.br','gustavo@hyzi.com.br','gusizidro@gmail.com'];
var TOK=null,USR=null,C={},_pg={},_ch={};
var _DATA={};

function ntf(m,t){
  t=t||'ok';
  var e=document.createElement('div');
  e.className='nti '+(t==='ok'?'ok':'err');
  e.textContent=(t==='ok'?'OK: ':'ERRO: ')+m;
  document.getElementById('ntf').appendChild(e);
  setTimeout(function(){if(e.parentNode)e.parentNode.removeChild(e)},3500);
}
function setM(h){document.getElementById('ma').innerHTML=h}
function gv(id){var el=document.getElementById(id);return el?el.value:''}
function abrirModal(id){document.getElementById(id).classList.add('open')}
function fecharModal(id){document.getElementById(id).classList.remove('open')}
function fR(v){var n=parseFloat(String(v).replace(',','.'))||0;return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function excelToDate(v){
  if(!v||v==='') return null;
  var s=String(v).trim();
  if(/^[0-9]{4,5}$/.test(s)){var d=new Date((parseInt(s)-25569)*86400000);return isNaN(d.getTime())?null:d}
  var d=new Date(s.indexOf('T')>=0?s:s+'T12:00:00');
  return isNaN(d.getTime())?null:d;
}
function fD(v){var d=excelToDate(v);if(!d)return v||'--';return d.toLocaleDateString('pt-BR')}
function filtroPer(v,meses){
  if(!meses||meses==='all') return true;
  var d=excelToDate(v);if(!d) return false;
  var lim=new Date();lim.setMonth(lim.getMonth()-parseInt(meses));
  return d>=lim;
}
function today(){return new Date().toISOString().split('T')[0]}
function cl(n){return n<26?String.fromCharCode(65+n):'A'+String.fromCharCode(65+n-26)}
function pgArr(arr,p,n){n=n||20;return{items:arr.slice((p-1)*n,p*n),total:Math.ceil(arr.length/n)}}
function bSt(s){
  var t=(s||'').toLowerCase();
  if(t.indexOf('conclu')>=0||t.indexOf('finaliz')>=0||t.indexOf('entregue')>=0) return '<span class="badge bvd">'+(s||'Concluido')+'</span>';
  if(t.indexOf('andamento')>=0) return '<span class="badge baz">'+s+'</span>';
  if(t.indexOf('parali')>=0||t.indexOf('paus')>=0||t.indexOf('medir')>=0) return '<span class="badge bam">'+s+'</span>';
  return '<span class="badge bgr">'+(s||'Nao iniciado')+'</span>';
}
function bPr(s){
  if(s==='Aceita') return '<span class="badge bvd">'+s+'</span>';
  if(s==='Pendente') return '<span class="badge bam">'+s+'</span>';
  if(s==='Rejeitada') return '<span class="badge brd">'+s+'</span>';
  return '<span class="badge bgr">'+(s||'--')+'</span>';
}
function pgHtml(tot,p,fn){
  if(tot<=1) return '';
  var h='<div class="pag">';
  if(p>1) h+='<button class="pb" data-fn="'+fn+'" data-p="'+(p-1)+'">&#8592;</button>';
  for(var i=Math.max(1,p-2);i<=Math.min(tot,p+2);i++){
    h+='<button class="pb'+(i===p?' act':'')+'" data-fn="'+fn+'" data-p="'+i+'">'+i+'</button>';
  }
  if(p<tot) h+='<button class="pb" data-fn="'+fn+'" data-p="'+(p+1)+'">&#8594;</button>';
  h+='<span class="pi">Pg '+p+'/'+tot+'</span></div>';
  return h;
}
function chipsHtml(p){
  var ne=parseInt(p['QUANTIDADE ETAPAS'])||0,h='';
  for(var i=1;i<=ne;i++){
    var s=(p['STATUS E'+i]||'').toLowerCase();
    var cls=s.indexOf('conclu')>=0||s.indexOf('entregue')>=0?'chip done':s.indexOf('andamento')>=0?'chip prog':'chip';
    h+='<span class="'+cls+'">'+(p['ETAPA '+i]||'E'+i)+'</span>';
  }
  return h;
}
function bindPagination(){
  var btns=document.querySelectorAll('.pb[data-fn]');
  for(var i=0;i<btns.length;i++){
    (function(btn){
      btn.addEventListener('click',function(){
        var fn=this.getAttribute('data-fn');
        var p=parseInt(this.getAttribute('data-p'));
        if(window[fn]) window[fn](p);
      });
    })(btns[i]);
  }
}

async function sGet(id,ab){
  var k=id+ab;if(C[k])return C[k];
  var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+id+'/values/'+encodeURIComponent(ab),{headers:{Authorization:'Bearer '+TOK}});
  var d=await r.json();if(d.error)throw new Error(d.error.message);
  C[k]=d.values||[];return C[k];
}
async function sApp(id,ab,v){
  var r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+id+'/values/'+encodeURIComponent(ab)+':append?valueInputOption=USER_ENTERED',
    {method:'POST',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},body:JSON.stringify({values:v})});

PGS.fin=async function(){
  setM('<div class="loading"><div class="spin"></div>Carregando...</div>');
  var rp=await sGet(SH.g,'Cadastro_Projetos');
  var rpr=await sGet(SH.g,'Cadastro_Propostas');
  var allP=r2o(rp).filter(function(p){return p['EMPRESA']});
  var allPr=r2o(rpr).filter(function(p){return p['Empresa']});
  var per=_pg.fp||'all',stf=_pg.fst||'';
  var prop=allPr;
  if(per!=='all') prop=prop.filter(function(p){return filtroPer(p['Data']||p['DATA INÍCIO'],per)});
  if(stf) prop=prop.filter(function(p){return p['Status']===stf});
  var rAc=0,nAc=0,rPd=0,rRj=0;
  prop.forEach(function(p){var v=parseFloat(p['Valor'])||0;if(p['Status']==='Aceita'){rAc+=v;nAc++}else if(p['Status']==='Pendente')rPd+=v;else if(p['Status']==='Rejeitada')rRj+=v});
  var taxa=prop.length>0?Math.round(nAc/prop.length*100):0;
  var etapas=[];
  allP.forEach(function(p){for(var i=1;i<=6;i++){var v=parseFloat(p['VALOR E'+i])||0;if(v>0){var s=(p['STATUS E'+i]||'').toLowerCase();etapas.push({obra:p['NOME OBRA'],et:p['ETAPA '+i]||'E'+i,v:v,st:p['STATUS E'+i]||'',ok:s.indexOf('conclu')>=0})}}});
  var ar=etapas.filter(function(e){return !e.ok}).reduce(function(s,e){return s+e.v},0);
  var byCli={};prop.filter(function(p){return p['Status']==='Aceita'}).forEach(function(p){var e=p['Empresa']||'Outro';byCli[e]=(byCli[e]||0)+(parseFloat(p['Valor'])||0)});
  var topCli=Object.entries(byCli).sort(function(a,b){return b[1]-a[1]}).slice(0,5);

  html+='<div class="fb"><span class="fbl">Filtros:</span>';
  html+='<select class="fi" id="fp"><option value="all" '+(per==='all'?'selected':'')+'>Todo periodo</option><option value="1">Ult mes</option><option value="3">Ult 3 meses</option><option value="6">Ult 6 meses</option><option value="12">Ult 1 ano</option></select>';
  html+='<select class="fi" id="fst"><option value="">Todos</option><option '+(stf==='Aceita'?'selected':'')+'>Aceita</option><option '+(stf==='Pendente'?'selected':'')+'>Pendente</option><option '+(stf==='Rejeitada'?'selected':'')+'>Rejeitada</option></select></div>';
  html+='<div class="stats c4"><div class="sc"><div class="sl">Receita contratada</div><div class="sv svd" style="font-size:18px">'+fR(rAc)+'</div><div class="ss2">'+nAc+' contratos</div></div>';
  html+='<div class="sc"><div class="sl">A receber</div><div class="sv saz" style="font-size:18px">'+fR(ar)+'</div></div>';
  html+='<div class="sc"><div class="sl">Em negociacao</div><div class="sv sam" style="font-size:18px">'+fR(rPd)+'</div></div>';
  html+='<div class="sc"><div class="sl">Ticket medio</div><div class="sv" style="color:#6b76e8;font-size:18px">'+fR(nAc>0?rAc/nAc:0)+'</div><div class="ss2">Conv: '+taxa+'%</div></div></div>';
  html+='<div class="cg cg2" style="margin-bottom:18px"><div class="cc"><div class="cct">Receita por cliente</div><div class="chw"><canvas id="ch-fin-cli"></canvas></div></div>';
  html+='<div class="cc"><div class="cct">Distribuicao</div><div class="dw"><canvas id="ch-fin-pr"></canvas></div>';
  html+='<div class="leg"><div class="lgi"><div class="lgd" style="background:#2DEC99"></div>Aceitas: '+fR(rAc)+'</div><div class="lgi"><div class="lgd" style="background:#f5a623"></div>Pendentes: '+fR(rPd)+'</div></div></div></div>';
  html+='<div class="ph"><div class="pt" style="font-size:16px">Etapas a receber</div></div>';
  html+='<div class="tw"><table><thead><tr><th>Obra</th><th>Etapa</th><th>Valor</th><th>Status</th></tr></thead><tbody>';
  etapas.filter(function(e){return !e.ok}).slice(0,30).forEach(function(e){
    html+='<tr><td style="font-weight:500">'+(e.obra||'--')+'</td><td>'+e.et+'</td><td style="font-weight:600;color:var(--az)">'+fR(e.v)+'</td><td>'+bSt(e.st)+'</td></tr>';
  });
  html+='</tbody></table></div>';
  setM(html);
  document.getElementById('fp').onchange=function(){_pg.fp=this.value;PGS.fin()};
  document.getElementById('fst').onchange=function(){_pg.fst=this.value;PGS.fin()};

    if(topCli.length) mkBar('ch-fin-cli',topCli.map(function(x){return x[0].substring(0,10)}),topCli.map(function(x){return x[1]}));
    mkDonut('ch-fin-pr',['Aceitas','Pendentes','Rejeitadas'],[rAc,rPd,rRj],['#2DEC99','#f5a623','#ff4d4d'],taxa+'%','conv');
  },100);
};

async function salvPr(row){
  var ne=parseInt(gv('prne'))||1;
  var vals=[gv('prp'),gv('prpr'),gv('prd'),gv('pro'),gv('pri'),gv('prf'),gv('prst'),gv('prcc'),gv('prc'),gv('prpg'),ne,gv('prv')||0];
  for(var i=1;i<=6;i++) vals.push(gv('en'+i));
  for(var i=1;i<=6;i++) vals.push(gv('ed'+i));
  for(var i=1;i<=6;i++) vals.push(gv('ev'+i)||0);
  for(var i=1;i<=6;i++) vals.push(gv('es'+i));
  for(var i=1;i<=6;i++) vals.push(gv('ep'+i));
  try{
    if(row) await sUpd(SH.g,'Cadastro_Projetos','B'+row+':AM'+row,[vals]);
    else{var id=await nxtId(SH.g,'Cadastro_Projetos','ID');await sApp(SH.g,'Cadastro_Projetos',[[id].concat(vals)])}
    fecharModal('ov-proj');ntf('Projeto salvo!');PGS.proj();
  }catch(e){ntf('Erro.','err');console.error(e)}
}

async function editUsrRow(row){
  var rows=await sGet(SH.g,'Cadastro_Usuarios');
  var u=r2o(rows).find(function(x){return x._row===row});if(!u)return;
  var el=document.getElementById('mf-usr');
  var html='<div class="mhd"><div class="mtl">Editar Usuario</div><button class="mcl" id="cl-usr">x</button></div>';
  html+='<div class="mg"><div class="mf"><label>Nome</label><input id="unn" type="text" value="'+(u['Nome']||'')+'"></div><div class="mf"><label>E-mail</label><input id="une" type="email" value="'+(u['E-mail']||'')+'"></div></div>';
  html+='<div class="mg"><div class="mf"><label>Telefone</label><input id="unt" type="text" value="'+(u['Telefone']||'')+'"></div><div class="mf"><label>Data entrada</label><input id="und" type="date" value="'+(u['Data Entrada']?String(u['Data Entrada']).split('T')[0]:'')+'"></div></div>';
  html+='<div class="mg"><div class="mf"><label>R$/hora</label><input id="unh" type="number" value="'+(u['Valor Hora Tecnica']||u['Valor Hora Técnica']||0)+'" step="0.01"></div><div class="mf"><label>Senha</label><input id="uns" type="text" value="'+(u['Senha']||'')+'"></div></div>';
  html+='<div class="mf"><label>Endereco</label><input id="unad" type="text" value="'+(u['Endereco']||u['Endereço']||'')+'"></div>';
  html+='<div class="mft"><button class="btn bgh" id="cl-usr2">Cancelar</button><button class="btn baz2" id="sv-usr">Salvar</button></div>';
  el.innerHTML=html;abrirModal('ov-usr');
  document.getElementById('cl-usr').onclick=function(){fecharModal('ov-usr')};
  document.getElementById('cl-usr2').onclick=function(){fecharModal('ov-usr')};
  document.getElementById('sv-usr').onclick=function(){salvUsr(row)};
}
async function salvUsr(row){
  var vals=[gv('unn'),gv('une'),gv('unt'),gv('unad'),gv('und'),gv('unh')||0,gv('uns')];
  try{
    if(row) await sUpd(SH.g,'Cadastro_Usuarios','B'+row+':H'+row,[vals]);
    else{var id=await nxtId(SH.g,'Cadastro_Usuarios','ID Usuario');await sApp(SH.g,'Cadastro_Usuarios',[[id].concat(vals)])}
    fecharModal('ov-usr');ntf('Usuario salvo!');PGS.eq();
  }catch(e){ntf('Erro.','err');console.error(e)}
}
