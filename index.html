<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyzi Engenharia — Gestão de Projetos</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--az:#2934CB;--azd:#1e26a0;--azl:rgba(41,52,203,0.12);--vd:#2DEC99;--vdd:#1db87a;--vdl:rgba(45,236,153,0.12);--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;--bo:rgba(255,255,255,0.07);--bo2:rgba(255,255,255,0.14);--tx:#f0f0f0;--tx2:#8888a0;--tx3:#4a4a5a;--red:#ff4d4d;--amb:#f5a623;--r:10px;--rs:7px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Space Grotesk',sans-serif;font-size:15px;min-height:100vh}
input,select,textarea,button{font-family:'Space Grotesk',sans-serif}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 60% 50% at 20% 50%,rgba(41,52,203,0.25) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(45,236,153,0.1) 0%,transparent 60%),var(--bg)}
.lwrap{display:flex;width:100%;max-width:880px;min-height:500px;border-radius:20px;overflow:hidden;box-shadow:0 60px 120px rgba(0,0,0,0.6)}
.lleft{flex:1;background:var(--az);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;position:relative;overflow:hidden}
.lleft::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 70%,rgba(45,236,153,0.2) 0%,transparent 60%)}
.lleft-c{position:relative;z-index:1;text-align:center}
.lsym{margin-bottom:28px}
.lbrand{font-size:40px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1}
.lbrand-s{font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:3px;text-transform:uppercase;margin-top:8px}
.ltag{font-size:12px;color:rgba(255,255,255,0.45);margin-top:28px;line-height:1.7;max-width:220px}
.lright{flex:1;background:var(--bg2);display:flex;flex-direction:column;justify-content:center;padding:48px}
.ltitle{font-size:22px;font-weight:700;margin-bottom:5px}
.lsub{font-size:13px;color:var(--tx2);margin-bottom:28px}
.f{margin-bottom:15px}
.f label{display:block;font-size:10px;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.f input,.f select{width:100%;background:var(--bg3);border:1.5px solid var(--bo);border-radius:var(--rs);color:var(--tx);padding:11px 13px;font-size:14px;outline:none;transition:border-color .2s}
.f input:focus,.f select:focus{border-color:var(--az)}
.btnl{width:100%;background:var(--az);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:6px}
.btnl:hover{background:var(--azd)}
.lerr{color:var(--red);font-size:13px;margin-top:10px;display:none}
.cfg-hint{background:var(--bg3);border:1px solid var(--bo);border-radius:var(--rs);padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--tx2);line-height:1.6}
#app{display:none;flex-direction:column;min-height:100vh}
.tb{background:var(--bg2);border-bottom:1px solid var(--bo);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:12px}
.tb-logo{display:flex;align-items:center;gap:9px}
.tb-name{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
.tb-r{display:flex;align-items:center;gap:10px}
.upill{background:var(--bg3);border:1px solid var(--bo);border-radius:20px;padding:4px 11px 4px 7px;display:flex;align-items:center;gap:7px;font-size:12px}
.uav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.av-m{background:var(--az)}.av-t{background:var(--vdd)}
.bperfil{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700}
.bp-m{background:var(--azl);color:var(--az);border:1px solid rgba(41,52,203,.3)}
.bp-t{background:var(--vdl);color:var(--vdd);border:1px solid rgba(45,236,153,.3)}
.btnout{background:none;border:1px solid var(--bo);color:var(--tx2);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:11px}
.btnout:hover{border-color:var(--bo2);color:var(--tx)}
.abody{display:flex;flex:1;overflow:hidden;height:calc(100vh - 54px)}
.sb{width:210px;background:var(--bg2);border-right:1px solid var(--bo);padding:16px 10px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;overflow-y:auto}
.ss{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);padding:10px 9px 5px;font-weight:700}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);font-size:12px;color:var(--tx2);cursor:pointer;transition:all .15s;font-weight:500}
.ni:hover{background:var(--bg3);color:var(--tx)}
.ni.active{background:var(--azl);color:var(--az);border:1px solid rgba(41,52,203,.2)}
.ni-ic{font-size:14px;width:18px;text-align:center}
.ma{flex:1;overflow-y:auto;padding:24px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.pt{font-size:20px;font-weight:700;letter-spacing:-.3px}
.pt span{color:var(--tx2);font-size:14px;font-weight:400;margin-left:7px}
.pa{display:flex;gap:7px}
.stats{display:grid;gap:13px;margin-bottom:22px}
.c4{grid-template-columns:repeat(4,1fr)}.c3{grid-template-columns:repeat(3,1fr)}.c2{grid-template-columns:repeat(2,1fr)}
.sc{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:16px 18px}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);font-weight:700;margin-bottom:7px}
.sv{font-size:28px;font-weight:700;line-height:1;letter-spacing:-1px}
.sv.az{color:var(--az)}.sv.vd{color:var(--vd)}.sv.red{color:var(--red)}.sv.amb{color:var(--amb)}.sv.wh{color:var(--tx)}
.ss2{font-size:11px;color:var(--tx2);margin-top:4px}
.card{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:18px}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);font-weight:700;margin-bottom:13px}
.tw{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 13px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);border-bottom:1px solid var(--bo);font-weight:700;white-space:nowrap;background:var(--bg3)}
tbody td{padding:10px 13px;border-bottom:1px solid var(--bo);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.015)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bvd{background:var(--vdl);color:var(--vdd);border:1px solid rgba(45,236,153,.25)}
.baz{background:var(--azl);color:#6b76e8;border:1px solid rgba(41,52,203,.25)}
.bam{background:rgba(245,166,35,.12);color:var(--amb);border:1px solid rgba(245,166,35,.25)}
.brd{background:rgba(255,77,77,.12);color:var(--red);border:1px solid rgba(255,77,77,.25)}
.bgr{background:rgba(255,255,255,.06);color:var(--tx2);border:1px solid var(--bo)}
.btn{padding:7px 14px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.bsm{padding:4px 10px;font-size:11px}
.baz2{background:var(--az);color:#fff}.baz2:hover{background:var(--azd)}
.bvd2{background:var(--vd);color:#000}.bvd2:hover{background:var(--vdd)}
.bgh{background:var(--bg3);color:var(--tx);border:1px solid var(--bo)}.bgh:hover{border-color:var(--bo2)}
.bdr{background:rgba(255,77,77,.1);color:var(--red);border:1px solid rgba(255,77,77,.2)}
.flt-row{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.srch{background:var(--bg2);border:1.5px solid var(--bo);color:var(--tx);padding:8px 13px;border-radius:var(--rs);font-size:12px;outline:none;flex:1;min-width:160px}
.srch:focus{border-color:var(--az)}
.flt{background:var(--bg2);border:1.5px solid var(--bo);color:var(--tx);padding:8px 11px;border-radius:var(--rs);font-size:12px;outline:none;cursor:pointer}
.flt:focus{border-color:var(--az)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bo2);border-radius:16px;padding:26px;width:100%;max-width:580px;margin:auto}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mt{font-size:17px;font-weight:700}
.mc{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;line-height:1;padding:2px}
.mc:hover{color:var(--tx)}
.mf{margin-bottom:13px}
.mf label{display:block;font-size:10px;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.mf input,.mf select,.mf textarea{width:100%;background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:9px 11px;border-radius:var(--rs);font-size:13px;outline:none}
.mf textarea{resize:vertical;min-height:70px}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--az)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.mft{display:flex;gap:9px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--bo)}
.fsec{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--az);font-weight:700;margin:16px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--azl)}
.pc{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:16px;cursor:pointer;transition:border-color .2s,background .2s}
.pc:hover{border-color:var(--bo2);background:var(--bg3)}
.pc-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.pc-t{font-size:14px;font-weight:600}
.pc-m{font-size:11px;color:var(--tx2);margin-top:2px}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.chip{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--bo);color:var(--tx2)}
.chip.done{background:var(--vdl);border-color:rgba(45,236,153,.3);color:var(--vdd)}
.chip.prog{background:var(--azl);border-color:rgba(41,52,203,.3);color:#6b76e8}
.loading{text-align:center;padding:50px;color:var(--tx2)}
.spin{width:28px;height:28px;border:2.5px solid var(--bo);border-top-color:var(--az);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.pag{display:flex;gap:4px;align-items:center;justify-content:flex-end;margin-top:12px}
.pb{background:var(--bg2);border:1px solid var(--bo);color:var(--tx2);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-family:'Space Grotesk',sans-serif}
.pb:hover{border-color:var(--bo2);color:var(--tx)}
.pb.act{background:var(--az);color:#fff;border-color:var(--az)}
.pi{font-size:11px;color:var(--tx2);margin-left:4px}
.ntf{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px}
.ni2{background:var(--bg3);border:1px solid var(--bo2);border-radius:var(--rs);padding:11px 15px;font-size:12px;max-width:300px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:sli .3s ease}
.ni2.ok{border-left:3px solid var(--vd)}.ni2.err{border-left:3px solid var(--red)}
@keyframes sli{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
@media(max-width:768px){.c4{grid-template-columns:repeat(2,1fr)}.c3{grid-template-columns:repeat(2,1fr)}.sb{display:none}.ma{padding:14px}.mg{grid-template-columns:1fr}.lwrap{flex-direction:column;max-width:420px}.lleft{padding:28px;min-height:180px}}
</style>
</head>
<body>
<div class="ntf" id="ntf"></div>

<div id="login-screen">
  <div class="lwrap" id="lwrap">
    <div class="lleft">
      <div class="lleft-c">
        <div class="lsym"><svg width="54" height="54" viewBox="0 0 60 60"><polygon points="10,0 30,30 10,60 0,60 0,0" fill="rgba(255,255,255,.92)"/><polygon points="50,0 60,0 60,60 50,60 30,30" fill="rgba(255,255,255,.92)"/></svg></div>
        <div class="lbrand">Hyzi</div>
        <div class="lbrand-s">Engenharia</div>
        <div class="ltag">Sistema de Gestão e Acompanhamento de Projetos</div>
      </div>
    </div>
    <div class="lright">
      <div class="ltitle">Bem-vindo</div>
      <div class="lsub">Entre com suas credenciais</div>
      <div class="f"><label>E-mail</label><input type="email" id="le" placeholder="seu@hyzi.com.br"/></div>
      <div class="f"><label>Senha</label><input type="password" id="ls" placeholder="••••••"/></div>
      <button class="btnl" onclick="login()">Entrar</button>
      <div class="lerr" id="lerr"></div>
    </div>
  </div>
</div>

<div id="app">
  <div class="tb">
    <div class="tb-l">
      <div class="tb-logo">
        <svg width="20" height="20" viewBox="0 0 60 60"><polygon points="10,0 30,30 10,60 0,60 0,0" fill="#2934CB"/><polygon points="50,0 60,0 60,60 50,60 30,30" fill="#2934CB"/></svg>
        <span class="tb-name">Hyzi Engenharia</span>
      </div>
    </div>
    <div class="tb-r">
      <div class="upill"><div class="uav" id="uav"></div><span id="unm"></span><span class="bperfil" id="ubp"></span></div>
      <button class="btnout" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="abody">
    <div class="sb" id="sb"></div>
    <div class="ma" id="ma"><div class="loading"><div class="spin"></div>Carregando...</div></div>
  </div>
</div>

<div class="ov" id="ov-emp"><div class="modal" id="mf-emp"></div></div>
<div class="ov" id="ov-prop"><div class="modal" id="mf-prop"></div></div>
<div class="ov" id="ov-proj"><div class="modal" id="mf-proj" style="max-width:680px"></div></div>
<div class="ov" id="ov-usr"><div class="modal" id="mf-usr"></div></div>

<script>
const SH={g:'1MWlcTXGY4y8x52k6jBGejQfygR4gIUqLoQSEa_9hp0g',t:'1Npgou9881i6JIyEH4MEOsXPz2Iwjutc2fGWVub74aFQ'};
const MASTERS=['andreia@hyzi.com.br','gustavo@hyzi.com.br','gusizidro@gmail.com'];
let TOK=null,USR=null,C={},_pg={};

function ntf(m,t='ok'){const e=document.createElement('div');e.className='ni2 '+t;e.textContent=(t==='ok'?'✓ ':'✕ ')+m;document.getElementById('ntf').appendChild(e);setTimeout(()=>e.remove(),3500)}

async function sGet(id,ab){const k=id+ab;if(C[k])return C[k];const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(ab)}`,{headers:{Authorization:'Bearer '+TOK}});const d=await r.json();if(d.error)throw new Error(d.error.message);C[k]=d.values||[];return C[k]}
async function sApp(id,ab,v){await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(ab)}:append?valueInputOption=USER_ENTERED`,{method:'POST',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},body:JSON.stringify({values:v})});delete C[id+ab]}
async function sUpd(id,ab,rng,v){await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(ab+'!'+rng)}?valueInputOption=USER_ENTERED`,{method:'PUT',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},body:JSON.stringify({values:v})});delete C[id+ab]}
function r2o(rows){if(!rows||rows.length<2)return[];const h=rows[0];return rows.slice(1).map((r,i)=>{const o={_row:i+2};h.forEach((k,j)=>o[k?k.trim():j]=r[j]||'');return o})}
async function nxtId(id,ab,col='ID'){const r=await sGet(id,ab);const o=r2o(r);if(!o.length)return 1;return Math.max(...o.map(x=>parseInt(x[col])||0))+1}
function cl(n){return n<26?String.fromCharCode(65+n):'A'+String.fromCharCode(65+n-26)}
function fR(v){const n=parseFloat(String(v).replace(',','.'))||0;return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function fD(v){if(!v||v==='')return'—';try{const s=String(v);const d=new Date(s);if(!isNaN(d))return d.toLocaleDateString('pt-BR');return s}catch{return String(v)}}
function td(){return new Date().toISOString().split('T')[0]}
function bSt(s){const t=(s||'').toLowerCase();if(t.includes('conclu')||t.includes('entregue'))return`<span class="badge bvd">${s||'Concluído'}</span>`;if(t.includes('andamento'))return`<span class="badge baz">${s}</span>`;if(t.includes('paus')||t.includes('medir'))return`<span class="badge bam">${s}</span>`;return`<span class="badge bgr">${s||'Não iniciado'}</span>`}
function bPr(s){if(s==='Aceita')return`<span class="badge bvd">${s}</span>`;if(s==='Pendente')return`<span class="badge bam">${s}</span>`;if(s==='Rejeitada')return`<span class="badge brd">${s}</span>`;return`<span class="badge bgr">${s||'—'}</span>`}
function pg(arr,p,n=20){return{items:arr.slice((p-1)*n,p*n),total:Math.ceil(arr.length/n)}}
function pgHtml(tot,p,fn){if(tot<=1)return'';let h='<div class="pag">';if(p>1)h+=`<button class="pb" onclick="${fn}(${p-1})">←</button>`;for(let i=Math.max(1,p-2);i<=Math.min(tot,p+2);i++)h+=`<button class="pb ${i===p?'act':''}" onclick="${fn}(${i})">${i}</button>`;if(p<tot)h+=`<button class="pb" onclick="${fn}(${p+1})">→</button>`;h+=`<span class="pi">Pg ${p}/${tot}</span></div>`;return h}
function abrir(id){document.getElementById(id).classList.add('open')}
function fechar(id){document.getElementById(id).classList.remove('open')}
function setM(h){document.getElementById('ma').innerHTML=h}
function v(id){return(document.getElementById(id)||{}).value||''}

// AUTH
async function login(){
  const e=document.getElementById('le').value.trim().toLowerCase();
  const s=document.getElementById('ls').value.trim();
  const er=document.getElementById('lerr');
  er.style.display='none';
  if(!e||!s){er.textContent='Preencha e-mail e senha.';er.style.display='block';return}
  const cid=localStorage.getItem('hyzi_cid');
  if(!cid){mostrarCfg(e,s);return}
  localStorage.setItem('hpe',e);localStorage.setItem('hps',s);
  const sc='https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive';
  window.location.href=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${cid}&redirect_uri=${encodeURIComponent(location.origin+location.pathname)}&response_type=token&scope=${encodeURIComponent(sc)}&prompt=select_account`;
}
function mostrarCfg(e,s){
  document.getElementById('lwrap').innerHTML=`<div class="lleft"><div class="lleft-c"><div class="lsym"><svg width="54" height="54" viewBox="0 0 60 60"><polygon points="10,0 30,30 10,60 0,60 0,0" fill="rgba(255,255,255,.92)"/><polygon points="50,0 60,0 60,60 50,60 30,30" fill="rgba(255,255,255,.92)"/></svg></div><div class="lbrand">Hyzi</div><div class="lbrand-s">Engenharia</div></div></div>
  <div class="lright"><div class="ltitle">Configuração</div><div class="lsub">Informe o Client ID OAuth (apenas uma vez)</div>
  <div class="cfg-hint">Encontre em: Google Cloud → APIs e Serviços → Credenciais → Hyzi Web → ID do cliente</div>
  <div class="f"><label>Client ID OAuth</label><input id="ccid" type="text" placeholder="xxxx.apps.googleusercontent.com" style="font-size:11px"/></div>
  <button class="btnl" onclick="saveCid('${e}','${s}')">Continuar →</button></div>`;
}
function saveCid(e,s){const v=document.getElementById('ccid').value.trim();if(!v)return;localStorage.setItem('hyzi_cid',v);localStorage.setItem('hpe',e);localStorage.setItem('hps',s);const sc='https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive';window.location.href=`https://accounts.google.com/o/oauth2/v2/auth?client_id=${v}&redirect_uri=${encodeURIComponent(location.origin+location.pathname)}&response_type=token&scope=${encodeURIComponent(sc)}&prompt=select_account`}
async function chkCb(){
  if(!location.hash.includes('access_token'))return;
  const p=new URLSearchParams(location.hash.substring(1));TOK=p.get('access_token');
  history.replaceState({},document.title,location.pathname);
  const e=localStorage.getItem('hpe'),s=localStorage.getItem('hps');

async function salvarLH(){
  const msg=document.getElementById('lmsg');
  const pid=v('lp'),desc=v('lde').trim();
  if(!desc){msg.textContent='Informe a descrição.';msg.style.color='var(--red)';msg.style.display='block';return}
  msg.textContent='Salvando...';msg.style.color='var(--tx2)';msg.style.display='block';
  try{
    const p=window._lhProj.find(x=>String(x['ID'])===String(pid));
    if(p)await sUpd(SH.g,'Cadastro_Projetos',`${cl(43)}${p._row}:${cl(49)}${p._row}`,[[USR['Nome'],v('lt'),desc,v('ld'),v('lv')||'0',v('lh2')||'0',p['NOME OBRA']||'']]);
    ntf('Lançamento registrado!');msg.textContent='✓ Salvo!';msg.style.color='var(--vd)';
    document.getElementById('lde').value='';document.getElementById('lh2').value='';document.getElementById('lv').value='';
  }catch(e){msg.textContent='Erro ao salvar.';msg.style.color='var(--red)';console.error(e)}
}

  for(let i=1;i<=ne;i++){
    const nm=p[`ETAPA ${i}`]||`Etapa ${i}`,st=p[`STATUS E${i}`]||'Não Iniciado',pr2=p[`PRAZO E${i}`]||'—',de=p[`DESCRIÇÃO E${i}`]||'';
    h+=`<div style="padding:12px 0;border-bottom:1px solid var(--bo)"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px"><div><div style="font-size:13px;font-weight:600">${nm}</div><div style="font-size:10px;color:var(--tx2)">Prazo: ${pr2}</div></div><select id="aes${i}" style="background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:6px 9px;border-radius:6px;font-size:11px;outline:none;font-family:'Space Grotesk',sans-serif"><option ${st==='Não Iniciado'?'selected':''}>Não Iniciado</option><option ${st==='Em andamento'?'selected':''}>Em andamento</option><option ${st==='Entregue a medir'?'selected':''}>Entregue a medir</option><option ${st==='Concluído'?'selected':''}>Concluído</option><option ${st==='Pausado'?'selected':''}>Pausado</option></select></div>${de?`<div style="font-size:11px;color:var(--tx2);line-height:1.5;background:var(--bg3);padding:7px;border-radius:5px;margin-top:5px">${de.substring(0,180)}${de.length>180?'...':''}</div>`:''}</div>`;
  }
  h+=`</div><button class="btn baz2" style="width:100%;justify-content:center;padding:11px;margin-top:14px" onclick="salvarAE()">Salvar Alterações</button>`;
  document.getElementById('aeet').innerHTML=h;window._aeAtual=p;
}

async function salvarAE(){
  const msg=document.getElementById('aemsg');
  msg.textContent='Salvando...';msg.style.color='var(--tx2)';msg.style.display='block';
  try{
    const p=window._aeAtual,ne=parseInt(p['QUANTIDADE ETAPAS'])||0;
    for(let i=1;i<=ne;i++){const s=document.getElementById(`aes${i}`);if(s)await sUpd(SH.g,'Cadastro_Projetos',`${cl(31+(i-1))}${p._row}`,[[s.value]])}
    delete C[SH.g+'Cadastro_Projetos'];ntf('Etapas atualizadas!');msg.textContent='✓ Atualizado!';msg.style.color='var(--vd)';
  }catch(e){msg.textContent='Erro.';msg.style.color='var(--red)';console.error(e)}
}

async function salvarFR(){
  const msg=document.getElementById('frmsg');
  const desc=v('frde').trim();
  if(!desc){msg.textContent='Informe a descrição.';msg.style.color='var(--red)';msg.style.display='block';return}
  msg.textContent='Salvando...';msg.style.color='var(--tx2)';msg.style.display='block';
  try{
    const p=window._frProj.find(x=>String(x['ID'])===String(v('frp')));
    if(p)await sUpd(SH.g,'Cadastro_Projetos',`${cl(43)}${p._row}:${cl(49)}${p._row}`,[[USR['Nome'],v('frt'),desc,v('frd'),'0','0',p['NOME OBRA']||'']]);
    ntf('Fato registrado!');msg.textContent='✓ Registrado!';msg.style.color='var(--vd)';
    document.getElementById('frde').value='';
  }catch(e){msg.textContent='Erro.';msg.style.color='var(--red)';console.error(e)}
}

function encodeProp(x){return JSON.stringify(x).replace(/'/g,"&#39;").replace(/"/g,"&quot;")}
function _renderProp(emps,p){

  document.getElementById('mf-prop').innerHTML=`<div class="mh"><div class="mt">${p?'Editar':'Nova'} Proposta</div><button class="mc" onclick="fechar('ov-prop')">×</button></div>
  <div class="mg"><div class="mf"><label>Empresa</label><select id="ppe">${eo}</select></div><div class="mf"><label>Nome da Obra</label><input id="ppo" type="text" value="${p?p['Nome da Obra']||'':''}" placeholder="Ex: 519CC"></div></div>
  <div class="mf"><label>Número da Proposta</label><input id="ppn" type="text" value="${p?p['Número da Proposta']||'':''}" placeholder="PRH_001_26_DIR_519CC"></div>
  <div class="mf"><label>Descrição</label><textarea id="ppd" rows="3">${p?p['Descrição']||'':''}</textarea></div>
  <div class="mg"><div class="mf"><label>Contato</label><input id="ppc" type="text" value="${p?p['Contato']||'':''}"></div><div class="mf"><label>Área total (m²)</label><input id="ppa" type="number" value="${p?p['Área']||0:''}" step="0.01"></div></div>
  <div class="mg"><div class="mf"><label>Valor (R$)</label><input id="ppv" type="number" value="${p?p['Valor']||0:''}" step="0.01"></div><div class="mf"><label>Status</label><select id="pps"><option ${!p||p['Status']==='Pendente'?'selected':''}>Pendente</option><option ${p&&p['Status']==='Aceita'?'selected':''}>Aceita</option><option ${p&&p['Status']==='Rejeitada'?'selected':''}>Rejeitada</option></select></div></div>
  <div class="mf"><label>Motivo (se rejeitada)</label><input id="ppm" type="text" value="${p?p['Motivo']||'':''}"></div>
  <div class="mft"><button class="btn bgh" onclick="fechar('ov-prop')">Cancelar</button><button class="btn baz2" onclick="salvProp(${p?p._row:'null'})">Salvar</button></div>`;
  abrir('ov-prop');
}
async function salvProp(row){
  const vals=[v('ppe'),v('ppo'),v('ppd'),v('ppc'),v('ppv')||0,v('pps'),v('ppm'),v('ppn'),v('ppa')||0];
  try{if(row&&row!=='null'){await sUpd(SH.g,'Cadastro_Propostas',`B${row}:J${row}`,[vals])}else{const id=await nxtId(SH.g,'Cadastro_Propostas','ID');await sApp(SH.g,'Cadastro_Propostas',[[id,...vals]])}
  fechar('ov-prop');ntf('Proposta salva!');PGS.prop();}catch(e){ntf('Erro.','err');console.error(e)}
}

// PROJETO
function encodeProj(x){return"'"+JSON.stringify(x).replace(/'/g,"\\'")+"'"}
async function novoProjeto(){const[re,rpr,ru]=await Promise.all([sGet(SH.g,'Cadastro_Empresas'),sGet(SH.g,'Cadastro_Propostas'),sGet(SH.g,'Cadastro_Usuarios')]);_renderProj(r2o(re).filter(e=>e['Cliente']),r2o(rpr),r2o(ru),null)}
async function editProjeto(js){const p=JSON.parse(js);const[re,rpr,ru]=await Promise.all([sGet(SH.g,'Cadastro_Empresas'),sGet(SH.g,'Cadastro_Propostas'),sGet(SH.g,'Cadastro_Usuarios')]);_renderProj(r2o(re).filter(e=>e['Cliente']),r2o(rpr),r2o(ru),p)}
function _renderProj(emps,props,users,p){
  const ne=p?parseInt(p['QUANTIDADE ETAPAS'])||1:1;
  const eo=emps.map(e=>`<option ${p&&e['Cliente']===p['EMPRESA']?'selected':''}>${e['Cliente']}</option>`).join('');
  const pro=props.map(x=>`<option ${p&&x['Número da Proposta']===p['NÚMERO PROPOSTA']?'selected':''}>${x['Número da Proposta']}</option>`).join('');
  const uo=users.map(u=>`<option ${p&&u['Nome']===(p['COORDENADOR ']||'').trim()?'selected':''}>${u['Nome']}</option>`).join('');
  let etHtml='<div class="fsec">Etapas do Projeto</div>';
  for(let i=1;i<=6;i++){etHtml+=`<div id="eb${i}" style="${i<=ne?'':'display:none'}"><div style="font-size:11px;color:var(--az);font-weight:700;margin:8px 0 5px">Etapa ${i}</div><div class="mg"><div class="mf"><label>Nome da etapa</label><input id="en${i}" type="text" value="${p?p[`ETAPA ${i}`]||'':''}" placeholder="Ex: AP: Anteprojeto"></div><div class="mf"><label>Prazo</label><input id="ep${i}" type="text" value="${p?p[`PRAZO E${i}`]||'':''}" placeholder="Ex: 15 dias"></div></div><div class="mg"><div class="mf"><label>Valor (R$)</label><input id="ev${i}" type="number" value="${p?p[`VALOR E${i}`]||'':''}" step="0.01"></div><div class="mf"><label>Status</label><select id="es${i}"><option ${!p||p[`STATUS E${i}`]==='Não Iniciado'?'selected':''}>Não Iniciado</option><option ${p&&p[`STATUS E${i}`]==='Em andamento'?'selected':''}>Em andamento</option><option ${p&&p[`STATUS E${i}`]==='Entregue a medir'?'selected':''}>Entregue a medir</option><option ${p&&p[`STATUS E${i}`]==='Concluído'?'selected':''}>Concluído</option></select></div></div><div class="mf"><label>Descrição</label><textarea id="ed${i}" rows="2">${p?p[`DESCRIÇÃO E${i}`]||'':''}</textarea></div></div>`}
  document.getElementById('mf-proj').innerHTML=`<div class="mh"><div class="mt">${p?'Editar Projeto':'Novo Projeto'}</div><button class="mc" onclick="fechar('ov-proj')">×</button></div>
  <div class="fsec">Dados do Projeto</div>
  <div class="mg"><div class="mf"><label>Empresa</label><select id="prmp">${eo}</select></div><div class="mf"><label>Nome da Obra</label><input id="prmo" type="text" value="${p?p['NOME OBRA']||'':''}" placeholder="Ex: 486-01"></div></div>
  <div class="mg"><div class="mf"><label>Proposta</label><select id="prmpr"><option value="">—</option>${pro}</select></div><div class="mf"><label>Coordenador Hyzi</label><select id="prmc"><option value="">—</option>${uo}</select></div></div>
  <div class="mf"><label>Coordenador do Cliente</label><input id="prmcc" type="text" value="${p?p['COORDEADOR CLIENTE']||'':''}" placeholder="Nome do coord. cliente"></div>
  <div class="mf"><label>Descrição / Escopo</label><textarea id="prmd" rows="3">${p?p['DESCRIÇÃO']||'':''}</textarea></div>
  <div class="mg"><div class="mf"><label>Data início</label><input id="prmi" type="date" value="${p&&p['DATA INÍCIO']?String(p['DATA INÍCIO']).split('T')[0]:''}"></div><div class="mf"><label>Data entrega</label><input id="prmf" type="date" value="${p&&p['DATA FIM']?String(p['DATA FIM']).split('T')[0]:''}"></div></div>
  <div class="mg">
    <div class="mf"><label>Status geral</label><select id="prmst"><option ${!p||p['STATUS GERAL ']==='Não iniciado'?'selected':''}>Não iniciado</option><option ${p&&p['STATUS GERAL ']==='Em andamento'?'selected':''}>Em andamento</option><option ${p&&p['STATUS GERAL ']==='Concluído'?'selected':''}>Concluído</option><option ${p&&p['STATUS GERAL ']==='Pausado'?'selected':''}>Pausado</option></select></div>
    <div class="mf"><label>Qtd etapas</label><select id="prmne" onchange="toggleEtapas(this.value)">${[1,2,3,4,5,6].map(n=>`<option ${n===ne?'selected':''}>${n}</option>`).join('')}</select></div>
  </div>
  <div class="mg"><div class="mf"><label>Valor total (R$)</label><input id="prmv" type="number" value="${p?p['VALOR']||'':''}" step="0.01"></div><div class="mf"><label>Forma de pagamento</label><input id="prmpg" type="text" value="${p?p['FORMA PAGTO']||'':''}" placeholder="Ex: 80% entrega + 20% aprovação"></div></div>
  ${etHtml}
  <div class="mft"><button class="btn bgh" onclick="fechar('ov-proj')">Cancelar</button><button class="btn baz2" onclick="salvProj(${p?p._row:'null'})">Salvar Projeto</button></div>`;
  window._editP=p;abrir('ov-proj');
}
function toggleEtapas(n){for(let i=1;i<=6;i++){const el=document.getElementById(`eb${i}`);if(el)el.style.display=i<=parseInt(n)?'':'none'}}
async function salvProj(row){
  const ne=parseInt(v('prmne'))||1;
  const vals=[v('prmp'),v('prmpr'),v('prmd'),v('prmo'),v('prmi'),v('prmf'),v('prmst'),v('prmcc'),v('prmc'),v('prmpg'),ne,v('prmv')||0];
  for(let i=1;i<=6;i++)vals.push(v(`en${i}`));
  for(let i=1;i<=6;i++)vals.push(v(`ed${i}`));
  for(let i=1;i<=6;i++)vals.push(v(`ev${i}`)||0);
  for(let i=1;i<=6;i++)vals.push(v(`es${i}`));
  for(let i=1;i<=6;i++)vals.push(v(`ep${i}`));
  try{if(row&&row!=='null'){await sUpd(SH.g,'Cadastro_Projetos',`B${row}:AM${row}`,[vals])}else{const id=await nxtId(SH.g,'Cadastro_Projetos','ID');await sApp(SH.g,'Cadastro_Projetos',[[id,...vals]])}
  fechar('ov-proj');ntf('Projeto salvo!');PGS.proj();}catch(e){ntf('Erro ao salvar.','err');console.error(e)}
}

async function salvUsr(row){
