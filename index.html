<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyzi Engenharia — Gestão de Projetos</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--az:#2934CB;--azd:#1e26a0;--azl:rgba(41,52,203,0.12);--vd:#2DEC99;--vdd:#1db87a;--vdl:rgba(45,236,153,0.12);--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;--bo:rgba(255,255,255,0.07);--bo2:rgba(255,255,255,0.14);--tx:#f0f0f0;--tx2:#8888a0;--tx3:#4a4a5a;--red:#ff4d4d;--amb:#f5a623;--r:10px;--rs:7px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Space Grotesk',sans-serif;font-size:15px;min-height:100vh}
input,select,textarea,button{font-family:'Space Grotesk',sans-serif}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 60% 50% at 20% 50%,rgba(41,52,203,0.25) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(45,236,153,0.1) 0%,transparent 60%),var(--bg)}
.lwrap{display:flex;width:100%;max-width:880px;min-height:500px;border-radius:20px;overflow:hidden;box-shadow:0 60px 120px rgba(0,0,0,0.6)}
.lleft{flex:1;background:var(--az);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;position:relative;overflow:hidden}
.lleft::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 70%,rgba(45,236,153,0.2) 0%,transparent 60%)}
.lleft-c{position:relative;z-index:1;text-align:center}
.lbrand{font-size:40px;font-weight:700;color:#fff;letter-spacing:-1px;line-height:1}
.lbrand-s{font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:3px;text-transform:uppercase;margin-top:8px}
.ltag{font-size:12px;color:rgba(255,255,255,0.45);margin-top:28px;line-height:1.7;max-width:220px}
.lright{flex:1;background:var(--bg2);display:flex;flex-direction:column;justify-content:center;padding:48px}
.ltitle{font-size:22px;font-weight:700;margin-bottom:5px}
.lsub{font-size:13px;color:var(--tx2);margin-bottom:28px}
.ff{margin-bottom:15px}
.ff label{display:block;font-size:10px;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.ff input{width:100%;background:var(--bg3);border:1.5px solid var(--bo);border-radius:var(--rs);color:var(--tx);padding:11px 13px;font-size:14px;outline:none;transition:border-color .2s}
.ff input:focus{border-color:var(--az)}
.btnl{width:100%;background:var(--az);color:#fff;border:none;border-radius:var(--rs);padding:13px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:6px}
.btnl:hover{background:var(--azd)}
.lerr{color:var(--red);font-size:13px;margin-top:10px;display:none}
.cfg-hint{background:var(--bg3);border:1px solid var(--bo);border-radius:var(--rs);padding:10px 12px;margin-bottom:14px;font-size:11px;color:var(--tx2);line-height:1.6}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
.tb{background:var(--bg2);border-bottom:1px solid var(--bo);padding:0 22px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:12px}
.tb-name{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
.tb-r{display:flex;align-items:center;gap:10px}
.upill{background:var(--bg3);border:1px solid var(--bo);border-radius:20px;padding:4px 11px 4px 7px;display:flex;align-items:center;gap:7px;font-size:12px}
.uav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.av-m{background:var(--az)}.av-t{background:var(--vdd)}
.bperfil{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700}
.bp-m{background:var(--azl);color:var(--az);border:1px solid rgba(41,52,203,.3)}
.bp-t{background:var(--vdl);color:var(--vdd);border:1px solid rgba(45,236,153,.3)}
.btnout{background:none;border:1px solid var(--bo);color:var(--tx2);padding:5px 11px;border-radius:6px;cursor:pointer;font-size:11px}
.btnout:hover{border-color:var(--bo2);color:var(--tx)}
.abody{display:flex;flex:1;overflow:hidden;height:calc(100vh - 54px)}
.sb{width:210px;background:var(--bg2);border-right:1px solid var(--bo);padding:16px 10px;display:flex;flex-direction:column;gap:3px;flex-shrink:0;overflow-y:auto}
.ss{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);padding:10px 9px 5px;font-weight:700}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);font-size:12px;color:var(--tx2);cursor:pointer;transition:all .15s;font-weight:500}
.ni:hover{background:var(--bg3);color:var(--tx)}
.ni.active{background:var(--azl);color:var(--az);border:1px solid rgba(41,52,203,.2)}
.ni-ic{font-size:14px;width:18px;text-align:center}
.ma{flex:1;overflow-y:auto;padding:24px}

/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.pt{font-size:20px;font-weight:700;letter-spacing:-.3px}
.pt span{color:var(--tx2);font-size:14px;font-weight:400;margin-left:7px}
.pa{display:flex;gap:7px;flex-wrap:wrap}

/* STATS */
.stats{display:grid;gap:13px;margin-bottom:20px}
.c4{grid-template-columns:repeat(4,1fr)}.c3{grid-template-columns:repeat(3,1fr)}.c2{grid-template-columns:repeat(2,1fr)}
.sc{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent,var(--az))}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);font-weight:700;margin-bottom:7px}
.sv{font-size:26px;font-weight:700;line-height:1;letter-spacing:-1px}
.sv.az{color:var(--az)}.sv.vd{color:var(--vd)}.sv.red{color:var(--red)}.sv.amb{color:var(--amb)}.sv.wh{color:var(--tx)}
.ss2{font-size:11px;color:var(--tx2);margin-top:4px}
.sc-trend{font-size:11px;margin-top:6px;display:flex;align-items:center;gap:4px}
.trend-up{color:var(--vd)}.trend-dn{color:var(--red)}

/* CHARTS */
.chart-grid{display:grid;gap:14px;margin-bottom:20px}
.cg2{grid-template-columns:repeat(2,1fr)}
.cg3{grid-template-columns:2fr 1fr}
.chart-card{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:18px}
.chart-title{font-size:12px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.chart-wrap{position:relative;height:180px}
.donut-wrap{position:relative;height:160px;display:flex;align-items:center;justify-content:center}
.donut-center{position:absolute;text-align:center;pointer-events:none}
.donut-center-val{font-size:22px;font-weight:700}
.donut-center-lbl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* FILTERS BAR */
.fbar{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.fbar-label{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);font-weight:700;white-space:nowrap}
.srch{background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:7px 12px;border-radius:var(--rs);font-size:12px;outline:none;flex:1;min-width:150px}
.srch:focus{border-color:var(--az)}
.flt{background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:7px 10px;border-radius:var(--rs);font-size:12px;outline:none;cursor:pointer}
.flt:focus{border-color:var(--az)}

/* TABLE */
.card{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:18px}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);font-weight:700;margin-bottom:13px}
.tw{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 13px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);border-bottom:1px solid var(--bo);font-weight:700;white-space:nowrap;background:var(--bg3)}
tbody td{padding:10px 13px;border-bottom:1px solid var(--bo);font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.015)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.bvd{background:var(--vdl);color:var(--vdd);border:1px solid rgba(45,236,153,.25)}
.baz{background:var(--azl);color:#6b76e8;border:1px solid rgba(41,52,203,.25)}
.bam{background:rgba(245,166,35,.12);color:var(--amb);border:1px solid rgba(245,166,35,.25)}
.brd{background:rgba(255,77,77,.12);color:var(--red);border:1px solid rgba(255,77,77,.25)}
.bgr{background:rgba(255,255,255,.06);color:var(--tx2);border:1px solid var(--bo)}

/* BUTTONS */
.btn{padding:7px 14px;border-radius:var(--rs);font-size:12px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:5px;font-weight:500}
.bsm{padding:4px 9px;font-size:11px}
.baz2{background:var(--az);color:#fff}.baz2:hover{background:var(--azd)}
.bvd2{background:var(--vd);color:#000}.bvd2:hover{background:var(--vdd)}
.bgh{background:var(--bg3);color:var(--tx);border:1px solid var(--bo)}.bgh:hover{border-color:var(--bo2)}
.bdr{background:rgba(255,77,77,.1);color:var(--red);border:1px solid rgba(255,77,77,.2)}.bdr:hover{background:rgba(255,77,77,.2)}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bo2);border-radius:16px;padding:26px;width:100%;max-width:580px;margin:auto}
.modal-lg{max-width:700px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mt2{font-size:17px;font-weight:700}
.mc{background:none;border:none;color:var(--tx2);font-size:22px;cursor:pointer;line-height:1;padding:2px}.mc:hover{color:var(--tx)}
.mf{margin-bottom:13px}
.mf label{display:block;font-size:10px;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.mf input,.mf select,.mf textarea{width:100%;background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:9px 11px;border-radius:var(--rs);font-size:13px;outline:none}
.mf textarea{resize:vertical;min-height:70px}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--az)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.mft{display:flex;gap:9px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--bo)}
.fsec{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--az);font-weight:700;margin:16px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--azl)}

/* PROJECT CARD */
.pc{background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:16px;transition:border-color .2s,background .2s}
.pc:hover{border-color:var(--bo2);background:var(--bg3)}
.pc-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.pc-t{font-size:14px;font-weight:600}
.pc-m{font-size:11px;color:var(--tx2);margin-top:2px}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.chip{padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--bo);color:var(--tx2)}
.chip.done{background:var(--vdl);border-color:rgba(45,236,153,.3);color:var(--vdd)}
.chip.prog{background:var(--azl);border-color:rgba(41,52,203,.3);color:#6b76e8}

/* PROGRESS BAR */
.pbar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:8px}
.pbar-fill{height:100%;border-radius:2px;transition:width .3s}

/* KPI STRIP */
.kpi-strip{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.kpi-mini{background:var(--bg2);border:1px solid var(--bo);border-radius:8px;padding:10px 14px;flex:1;min-width:120px}
.kpi-mini-val{font-size:18px;font-weight:700}
.kpi-mini-lbl{font-size:10px;color:var(--tx2);margin-top:2px}

/* LOADING */
.loading{text-align:center;padding:50px;color:var(--tx2)}
.spin{width:28px;height:28px;border:2.5px solid var(--bo);border-top-color:var(--az);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* PAGINATION */
.pag{display:flex;gap:4px;align-items:center;justify-content:flex-end;margin-top:12px}
.pb{background:var(--bg2);border:1px solid var(--bo);color:var(--tx2);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-family:'Space Grotesk',sans-serif}
.pb:hover{border-color:var(--bo2);color:var(--tx)}
.pb.act{background:var(--az);color:#fff;border-color:var(--az)}
.pi{font-size:11px;color:var(--tx2);margin-left:4px}

/* NOTIFICATIONS */
.ntf{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:7px}
.ni2{background:var(--bg3);border:1px solid var(--bo2);border-radius:var(--rs);padding:11px 15px;font-size:12px;max-width:300px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:sli .3s ease}
.ni2.ok{border-left:3px solid var(--vd)}.ni2.err{border-left:3px solid var(--red)}
@keyframes sli{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}

/* CONFIRM MODAL */
.confirm-modal{background:var(--bg2);border:1px solid var(--bo2);border-radius:16px;padding:26px;width:100%;max-width:400px;margin:auto;text-align:center}
.confirm-icon{font-size:36px;margin-bottom:12px}
.confirm-title{font-size:17px;font-weight:700;margin-bottom:8px}
.confirm-msg{font-size:13px;color:var(--tx2);margin-bottom:20px;line-height:1.6}
.confirm-btns{display:flex;gap:10px;justify-content:center}

@media(max-width:768px){.c4{grid-template-columns:repeat(2,1fr)}.c3{grid-template-columns:1fr 1fr}.sb{display:none}.ma{padding:14px}.mg{grid-template-columns:1fr}.cg2{grid-template-columns:1fr}.cg3{grid-template-columns:1fr}.lwrap{flex-direction:column;max-width:420px}.lleft{padding:28px;min-height:180px}}
</style>
</head>
<body>
<div class="ntf" id="ntf"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lwrap" id="lwrap">
    <div class="lleft">
      <div class="lleft-c">
        <div style="margin-bottom:28px">
          <svg width="54" height="54" viewBox="0 0 60 60"><polygon points="10,0 30,30 10,60 0,60 0,0" fill="rgba(255,255,255,.92)"/><polygon points="50,0 60,0 60,60 50,60 30,30" fill="rgba(255,255,255,.92)"/></svg>
        </div>
        <div class="lbrand">Hyzi</div>
        <div class="lbrand-s">Engenharia</div>
        <div class="ltag">Sistema de Gestão e Acompanhamento de Projetos</div>
      </div>
    </div>
    <div class="lright">
      <div class="ltitle">Bem-vindo</div>
      <div class="lsub">Entre com suas credenciais para acessar</div>
      <div class="ff"><label>E-mail</label><input type="email" id="le" placeholder="seu@hyzi.com.br"/></div>
      <div class="ff"><label>Senha</label><input type="password" id="ls" placeholder="••••••"/></div>
      <button class="btnl" onclick="login()">Entrar</button>
      <div class="lerr" id="lerr"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="tb">
    <div class="tb-l">
      <svg width="20" height="20" viewBox="0 0 60 60"><polygon points="10,0 30,30 10,60 0,60 0,0" fill="#2934CB"/><polygon points="50,0 60,0 60,60 50,60 30,30" fill="#2934CB"/></svg>
      <span class="tb-name">Hyzi Engenharia</span>
    </div>
    <div class="tb-r">
      <div class="upill"><div class="uav" id="uav"></div><span id="unm"></span><span class="bperfil" id="ubp"></span></div>
      <button class="btnout" onclick="logout()">Sair</button>
    </div>
  </div>
  <div class="abody">
    <div class="sb" id="sb"></div>
    <div class="ma" id="ma"><div class="loading"><div class="spin"></div>Carregando...</div></div>
  </div>
</div>

<!-- MODALS -->
<div class="ov" id="ov-emp"><div class="modal" id="mf-emp"></div></div>
<div class="ov" id="ov-prop"><div class="modal" id="mf-prop"></div></div>
<div class="ov" id="ov-proj"><div class="modal modal-lg" id="mf-proj"></div></div>
<div class="ov" id="ov-usr"><div class="modal" id="mf-usr"></div></div>
<div class="ov" id="ov-confirm"><div class="confirm-modal" id="mf-confirm"></div></div>

<script>
const SH={g:'1MWlcTXGY4y8x52k6jBGejQfygR4gIUqLoQSEa_9hp0g',t:'1Npgou9881i6JIyEH4MEOsXPz2Iwjutc2fGWVub74aFQ'};
const MASTERS=['andreia@hyzi.com.br','gustavo@hyzi.com.br','gusizidro@gmail.com'];
let TOK=null,USR=null,C={},_pg={},_charts={};

// ── UTILS ──
function ntf(m,t='ok'){const e=document.createElement('div');e.className='ni2 '+t;e.textContent=(t==='ok'?'✓ ':'✕ ')+m;document.getElementById('ntf').appendChild(e);setTimeout(()=>e.remove(),3500)}
function setM(h){document.getElementById('ma').innerHTML=h}
function v(id){return(document.getElementById(id)||{}).value||''}
function abrir(id){document.getElementById(id).classList.add('open')}
function fechar(id){document.getElementById(id).classList.remove('open')}
function fR(v){const n=parseFloat(String(v).replace(',','.'))||0;return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function fD(v){if(!v||v==='')return'—';try{const s=String(v);if(s.match(/^\d{4}-\d{2}-\d{2}/))return new Date(s+'T12:00:00').toLocaleDateString('pt-BR');if(s.includes('T'))return new Date(s).toLocaleDateString('pt-BR');return s}catch{return String(v)}}
function td(){return new Date().toISOString().split('T')[0]}
function cl(n){return n<26?String.fromCharCode(65+n):'A'+String.fromCharCode(65+n-26)}
function pg(arr,p,n=20){return{items:arr.slice((p-1)*n,p*n),total:Math.ceil(arr.length/n)}}
function pgH(tot,p,fn){if(tot<=1)return'';let h='<div class="pag">';if(p>1)h+=`<button class="pb" onclick="${fn}(${p-1})">←</button>`;for(let i=Math.max(1,p-2);i<=Math.min(tot,p+2);i++)h+=`<button class="pb ${i===p?'act':''}" onclick="${fn}(${i})">${i}</button>`;if(p<tot)h+=`<button class="pb" onclick="${fn}(${p+1})">→</button>`;h+=`<span class="pi">Pg ${p}/${tot}</span></div>`;return h}

function bSt(s){
  const t=(s||'').toLowerCase();
  if(t.includes('conclu')||t.includes('finaliz')||t.includes('entregue'))return`<span class="badge bvd">${s||'Concluído'}</span>`;
  if(t.includes('andamento'))return`<span class="badge baz">${s}</span>`;
  if(t.includes('parali')||t.includes('paus'))return`<span class="badge bam">${s}</span>`;
  if(t.includes('medir'))return`<span class="badge bam">${s}</span>`;
  return`<span class="badge bgr">${s||'Não iniciado'}</span>`;
}
function bPr(s){
  if(s==='Aceita')return`<span class="badge bvd">${s}</span>`;
  if(s==='Pendente')return`<span class="badge bam">${s}</span>`;
  if(s==='Rejeitada')return`<span class="badge brd">${s}</span>`;
  return`<span class="badge bgr">${s||'—'}</span>`;
}

// Filtro por período
function excelToDate(v){
  if(!v||v==='')return null;
  const s=String(v).trim();
  // Excel serial number (e.g. 46034)
  if(/^\d{4,5}$/.test(s)){
    const d=new Date((parseInt(s)-25569)*86400000);
    return isNaN(d)?null:d;
  }
  // ISO string or date string
  const d=new Date(s.includes('T')?s:s+'T12:00:00');
  return isNaN(d)?null:d;
}
function filtroPeriodo(data, meses){
  if(!meses||meses==='all')return true;
  const d=excelToDate(data);
  if(!d)return false;
  const limite=new Date();
  limite.setMonth(limite.getMonth()-parseInt(meses));
  return d>=limite;
}

// ── SHEETS API ──
async function sGet(id,ab){
  const k=id+ab;if(C[k])return C[k];
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(ab)}`,{headers:{Authorization:'Bearer '+TOK}});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  C[k]=d.values||[];return C[k];
}
async function sApp(id,ab,v){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(ab)}:append?valueInputOption=USER_ENTERED`,{method:'POST',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},body:JSON.stringify({values:v})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  delete C[id+ab];
}
async function sUpd(id,ab,rng,v){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(ab+'!'+rng)}?valueInputOption=USER_ENTERED`,{method:'PUT',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},body:JSON.stringify({values:v})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  delete C[id+ab];
}
async function sDel(id,sheetId,rowIndex){
  const body={requests:[{deleteDimension:{range:{sheetId,dimension:'ROWS',startIndex:rowIndex-1,endIndex:rowIndex}}}]};
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}:batchUpdate`,{method:'POST',headers:{Authorization:'Bearer '+TOK,'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
}
async function getSheetId(sid,name){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}`,{headers:{Authorization:'Bearer '+TOK}});
  const d=await r.json();
  const sh=d.sheets.find(s=>s.properties.title===name);
  return sh?sh.properties.sheetId:null;
}
function r2o(rows){if(!rows||rows.length<2)return[];const h=rows[0];return rows.slice(1).map((r,i)=>{const o={_row:i+2};h.forEach((k,j)=>o[k?k.trim():j]=r[j]||'');return o})}
async function nxtId(id,ab,col='ID'){const r=await sGet(id,ab);const o=r2o(r);if(!o.length)return 1;return Math.max(...o.map(x=>parseInt(x[col])||0))+1}

// ── FINANCEIRO ────────────────────────────────────────
async fin(){
  setM('<div class="loading"><div class="spin"></div>Carregando...</div>');
  const[rp,rpr]=await Promise.all([sGet(SH.g,'Cadastro_Projetos'),sGet(SH.g,'Cadastro_Propostas')]);
  const allProj=r2o(rp).filter(p=>p['EMPRESA']);
  const allProp=r2o(rpr).filter(p=>p['Empresa']);
  const per=_pg.finPer||'all',stF=_pg.finSt||'';

  let prop=allProp;
  let proj=allProj;
  if(per!=='all'){
    prop=prop.filter(p=>filtroPeriodo(p['Data']||p['DATA INÍCIO']||p['DATA FATO'],per));
    proj=proj.filter(p=>filtroPeriodo(p['DATA INÍCIO'],per));
  }
  if(stF)prop=prop.filter(p=>p['Status']===stF);

  const rAceita=prop.filter(p=>p['Status']==='Aceita').reduce((s,p)=>s+(parseFloat(p['Valor'])||0),0);
  const rPend=prop.filter(p=>p['Status']==='Pendente').reduce((s,p)=>s+(parseFloat(p['Valor'])||0),0);
  const rRej=prop.filter(p=>p['Status']==='Rejeitada').reduce((s,p)=>s+(parseFloat(p['Valor'])||0),0);
  const nAc=prop.filter(p=>p['Status']==='Aceita').length;
  const taxa=prop.length>0?Math.round(nAc/prop.length*100):0;
  const ticket=nAc>0?rAceita/nAc:0;

  // Etapas
  const etapas=[];
  proj.forEach(p=>{for(let i=1;i<=6;i++){const vl=parseFloat(p[`VALOR E${i}`])||0;if(vl>0)etapas.push({obra:p['NOME OBRA'],et:p[`ETAPA ${i}`]||`E${i}`,v:vl,st:p[`STATUS E${i}`]||'',ok:(p[`STATUS E${i}`]||'').toLowerCase().includes('conclu')})}});
  const ar=etapas.filter(e=>!e.ok).reduce((s,e)=>s+e.v,0);
  const rec=etapas.filter(e=>e.ok).reduce((s,e)=>s+e.v,0);

  // Por cliente
  const porCli={};prop.filter(p=>p['Status']==='Aceita').forEach(p=>{const e=p['Empresa']||'Outro';porCli[e]=(porCli[e]||0)+(parseFloat(p['Valor'])||0)});
  const topCli=Object.entries(porCli).sort((a,b)=>b[1]-a[1]).slice(0,5);

  setM(`
    <div class="ph"><div class="pt">Financeiro</div></div>
    <div class="fbar">
      <span class="fbar-label">Filtros:</span>
      <select class="flt" onchange="_pg.finPer=this.value;PGS.fin()">
        <option value="all" ${per==='all'?'selected':''}>Todo período</option>
        <option value="1" ${per==='1'?'selected':''}>Último mês</option>
        <option value="3" ${per==='3'?'selected':''}>Últimos 3 meses</option>
        <option value="6" ${per==='6'?'selected':''}>Últimos 6 meses</option>
        <option value="12" ${per==='12'?'selected':''}>Último ano</option>
      </select>
      <select class="flt" onchange="_pg.finSt=this.value;PGS.fin()">
        <option value="">Todos status</option><option>Aceita</option><option>Pendente</option><option>Rejeitada</option>
      </select>
    </div>
    <div class="stats c4">
      <div class="sc" style="--accent:#2DEC99"><div class="sl">Receita contratada</div><div class="sv vd" style="font-size:18px">${fR(rAceita)}</div><div class="ss2">${nAc} contratos</div></div>
      <div class="sc" style="--accent:#2934CB"><div class="sl">A receber (etapas)</div><div class="sv az" style="font-size:18px">${fR(ar)}</div><div class="ss2">Pendente de entrega</div></div>
      <div class="sc" style="--accent:#f5a623"><div class="sl">Em negociação</div><div class="sv amb" style="font-size:18px">${fR(rPend)}</div><div class="ss2">Taxa conv: ${taxa}%</div></div>
      <div class="sc" style="--accent:#6b76e8"><div class="sl">Ticket médio</div><div class="sv" style="color:#6b76e8;font-size:18px">${fR(ticket)}</div><div class="ss2">Por proposta aceita</div></div>
    </div>
    <div class="chart-grid cg2" style="margin-bottom:20px">
      <div class="chart-card">
        <div class="chart-title">Receita por cliente (top 5)</div>
        <div class="chart-wrap"><canvas id="ch-fin-cli"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Distribuição de propostas</div>
        <div class="donut-wrap"><canvas id="ch-fin-prop"></canvas></div>
        <div class="legend">
          <div class="leg-item"><div class="leg-dot" style="background:#2DEC99"></div>Aceitas: ${fR(rAceita)}</div>
          <div class="leg-item"><div class="leg-dot" style="background:#f5a623"></div>Pendentes: ${fR(rPend)}</div>
          <div class="leg-item"><div class="leg-dot" style="background:#ff4d4d"></div>Rejeitadas: ${fR(rRej)}</div>
        </div>
      </div>
    </div>
    <div class="ph"><div class="pt" style="font-size:16px">Etapas a receber</div></div>
    <div class="tw"><table>
      <thead><tr><th>Obra</th><th>Etapa</th><th>Valor</th><th>Status</th></tr></thead>
      <tbody>${etapas.filter(e=>!e.ok).slice(0,30).map(e=>`<tr>
        <td style="font-weight:500">${e.obra||'—'}</td><td>${e.et}</td>
        <td style="font-weight:600;color:var(--az)">${fR(e.v)}</td><td>${bSt(e.st)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`);

  setTimeout(()=>{
    if(topCli.length)mkBar('ch-fin-cli',topCli.map(x=>x[0].length>10?x[0].substring(0,10)+'…':x[0]),[{label:'Receita (R$)',data:topCli.map(x=>x[1]),backgroundColor:'rgba(41,52,203,0.7)',borderRadius:4}]);
    mkDonut('ch-fin-prop',['Aceitas','Pendentes','Rejeitadas'],[rAceita,rPend,rRej],['#2DEC99','#f5a623','#ff4d4d'],`${taxa}%`,'conversão');
  },100);
},

async mproj(){
  if(!USR.isMaster){PGS.dashTec();return}
  setM('<div class="loading"><div class="spin"></div>Carregando...</div>');
  const rows=await sGet(SH.g,'Cadastro_Projetos');
  const todos=r2o(rows).filter(p=>p['EMPRESA']);
  const nm=(USR['Nome']||'').split(' ')[0].toLowerCase();
  const meus=todos.filter(p=>(p['COORDENADOR ']||'').toLowerCase().includes(nm));
  const f=_pg.mpF||'',st=_pg.mpSt||'',et=_pg.mpEt||'';
  let l=meus.length?meus:todos;
  if(f){const fl=f.toLowerCase();l=l.filter(p=>(p['NOME OBRA']||'').toLowerCase().includes(fl)||(p['EMPRESA']||'').toLowerCase().includes(fl))}
  if(st)l=l.filter(p=>(p['STATUS GERAL']||p['STATUS GERAL ']||'')===st);
  if(et)l=l.filter(p=>{for(let i=1;i<=6;i++){if((p[`ETAPA ${i}`]||'').toLowerCase().includes(et.toLowerCase()))return true}return false});
  setM(`
    <div class="ph"><div class="pt">${meus.length?'Meus Projetos':'Projetos'} <span>(${l.length})</span></div></div>
    <div class="fbar">
      <input class="srch" placeholder="Buscar obra ou empresa..." value="${f}" oninput="_pg.mpF=this.value;PGS.mproj()">
      <select class="flt" onchange="_pg.mpSt=this.value;PGS.mproj()"><option value="">Todos status</option><option ${st==='Em andamento'?'selected':''}>Em andamento</option><option ${st==='Concluído'?'selected':''}>Concluído</option><option ${st==='Não iniciado'?'selected':''}>Não iniciado</option></select>
      <input class="srch" placeholder="Buscar por etapa..." style="max-width:180px" value="${et}" oninput="_pg.mpEt=this.value;PGS.mproj()">
    </div>
    <div style="display:flex;flex-direction:column;gap:9px">
      ${l.map(p=>{const ne=parseInt(p['QUANTIDADE ETAPAS'])||0;const ch=[];for(let i=1;i<=ne;i++){const s=(p[`STATUS E${i}`]||'').toLowerCase();ch.push(`<span class="chip ${s.includes('conclu')||s.includes('entregue')?'done':s.includes('andamento')?'prog':''}">${p[`ETAPA ${i}`]||`E${i}`}</span>`)}
      return`<div class="pc"><div class="pc-h"><div><div class="pc-t">${p['NOME OBRA']||'—'}</div><div class="pc-m">${p['EMPRESA']||''} · ${p['NÚMERO PROPOSTA']||''}</div></div>${bSt(p['STATUS GERAL']||p['STATUS GERAL '])}</div><div style="font-size:11px;color:var(--tx2);margin-bottom:7px">Início: ${fD(p['DATA INÍCIO'])} · Prazo: ${fD(p['DATA FIM'])} · Coord. cliente: ${p['COORDEADOR CLIENTE']||'—'}</div><div class="chips">${ch.join('')}</div></div>`}).join('')}
    </div>`);
},

// ── HISTÓRICO DO PROJETO ──────────────────────────────
async hist(){
  setM('<div class="loading"><div class="spin"></div>Carregando...</div>');
  const rows=await sGet(SH.g,'Cadastro_Projetos');
  const proj=r2o(rows).filter(p=>p['EMPRESA']);
  const nm=(USR['Nome']||'').split(' ')[0].toLowerCase();
  const meus=USR.isMaster?proj:proj.filter(p=>(p['COORDENADOR ']||'').toLowerCase().includes(nm));
  const lista=meus.length?meus:proj;
  const sel=_pg.histProj||'';
  const opts='<option value="">— Selecione um projeto —</option>'+lista.map(p=>`<option value="${p['ID']}" ${sel===String(p['ID'])?'selected':''}>${p['NOME OBRA']} — ${p['EMPRESA']}</option>`).join('');

  let detalhe='<div style="text-align:center;padding:40px;color:var(--tx2)">Selecione um projeto para ver o histórico completo.</div>';

  if(sel){
    const p=lista.find(x=>String(x['ID'])===sel);
    if(p){
      const ne=parseInt(p['QUANTIDADE ETAPAS'])||0;
      const st=p['STATUS GERAL']||p['STATUS GERAL ']||'';

      // Etapas
      let etapasHtml='';
      for(let i=1;i<=ne;i++){
        const enm=p[`ETAPA ${i}`]||`Etapa ${i}`;
        const est=p[`STATUS E${i}`]||'Não Iniciado';
        const epr=p[`PRAZO E${i}`]||'—';
        const ede=p[`DESCRIÇÃO E${i}`]||'';
        const ev=USR.isMaster?(parseFloat(p[`VALOR E${i}`])||0):null;
        const estDone=(est.toLowerCase().includes('conclu')||est.toLowerCase().includes('entregue'));
        const estProg=est.toLowerCase().includes('andamento');
        const estMedir=est.toLowerCase().includes('medir');
        etapasHtml+=`
          <div style="display:flex;gap:14px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--bo)">
            <div style="width:28px;height:28px;border-radius:50%;background:${estDone?'var(--vd)':estProg?'var(--az)':estMedir?'var(--amb)':'var(--bg4)'};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${estDone?'#000':'#fff'};flex-shrink:0;margin-top:2px">${i}</div>
            <div style="flex:1">
              <div style="display:flex;justify-content:space-between;align-items:flex-start">
                <div>
                  <div style="font-size:13px;font-weight:600">${enm}</div>
                  <div style="font-size:11px;color:var(--tx2);margin-top:2px">Prazo: ${epr}</div>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                  ${USR.isMaster&&ev?`<span style="font-size:12px;font-weight:600;color:var(--az)">${fR(ev)}</span>`:''}
                  ${bSt(est)}
                </div>
              </div>
              ${ede?`<div style="font-size:11px;color:var(--tx2);margin-top:6px;line-height:1.5;background:var(--bg3);padding:8px;border-radius:6px">${ede}</div>`:''}
              ${estMedir?`<div style="font-size:11px;color:var(--amb);margin-top:4px;font-weight:600">⏳ Aguardando medição/aprovação</div>`:''}
            </div>
          </div>`;
      }

      // Fato e lançamentos
      const fato=p['DESCRIÇÃO FATO']||'';
      const fatoTipo=p['TIPO FATO']||'';
      const fatoData=p['DATA FATO']||'';
      const fatoUser=p['USUARIO FATO']||'';
      const fatoHoras=p['HORAS FATO']||'';
      const fatoValor=p['VALOR FATO']||'';

      // Info financeira (só master)
      const finHtml=USR.isMaster?`
        <div style="margin-top:20px">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--az);font-weight:700;margin-bottom:12px;padding-bottom:5px;border-bottom:1px solid var(--azl)">Financeiro</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">
            <div class="sc" style="--accent:var(--az)"><div class="sl">Valor total</div><div class="sv az" style="font-size:18px">${fR(p['VALOR'])}</div></div>
            <div class="sc" style="--accent:var(--vd)"><div class="sl">Forma pgto</div><div style="font-size:13px;font-weight:500;margin-top:4px">${p['FORMA PAGTO']||'—'}</div></div>
            <div class="sc" style="--accent:var(--amb)"><div class="sl">Horas lançadas</div><div class="sv amb" style="font-size:18px">${fatoHoras||'0'}h</div></div>
          </div>
        </div>`:'';

      // Fato relevante
      const fatoHtml=fato?`
        <div style="margin-top:20px">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--az);font-weight:700;margin-bottom:12px;padding-bottom:5px;border-bottom:1px solid var(--azl)">Último Fato Relevante</div>
          <div style="background:var(--bg3);border:1px solid var(--bo);border-radius:var(--r);padding:14px">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
              <div>
                <span class="badge bam">${fatoTipo||'Fato'}</span>
                <span style="font-size:11px;color:var(--tx2);margin-left:8px">${fatoUser} · ${fD(fatoData)}</span>
              </div>
              ${USR.isMaster&&fatoValor&&fatoValor!=='0'?`<span style="font-size:12px;font-weight:600;color:var(--az)">${fR(fatoValor)}</span>`:''}
            </div>
            <div style="font-size:13px;line-height:1.6">${fato}</div>
            ${USR.isMaster&&fatoHoras&&fatoHoras!=='0'?`<div style="font-size:11px;color:var(--tx2);margin-top:6px">⏱ ${fatoHoras} horas lançadas</div>`:''}
          </div>
        </div>`:'<div style="margin-top:20px;font-size:13px;color:var(--tx2)">Nenhum fato relevante registrado ainda.</div>';

      detalhe=`
        <!-- CABEÇALHO DO PROJETO -->
        <div style="background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:20px;margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
            <div>
              <div style="font-size:20px;font-weight:700">${p['NOME OBRA']||'—'}</div>
              <div style="font-size:13px;color:var(--tx2);margin-top:4px">${p['EMPRESA']||''} · ${p['NÚMERO PROPOSTA']||''}</div>
            </div>
            ${bSt(st)}
          </div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;font-size:12px">
            <div><span style="color:var(--tx2)">Coordenador Hyzi:</span><br><strong>${p['COORDENADOR ']||'—'}</strong></div>
            <div><span style="color:var(--tx2)">Coord. Cliente:</span><br><strong>${p['COORDEADOR CLIENTE']||'—'}</strong></div>
            <div><span style="color:var(--tx2)">Período:</span><br><strong>${fD(p['DATA INÍCIO'])} → ${fD(p['DATA FIM'])}</strong></div>
          </div>
          ${p['DESCRIÇÃO']?`<div style="margin-top:12px;font-size:12px;color:var(--tx2);line-height:1.6;background:var(--bg3);padding:10px;border-radius:6px">${p['DESCRIÇÃO']}</div>`:''}
        </div>

        <!-- FINANCEIRO (master only) -->
        ${finHtml}

        <!-- ETAPAS -->
        <div style="background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:20px;margin-bottom:16px">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--az);font-weight:700;margin-bottom:4px;padding-bottom:5px;border-bottom:1px solid var(--azl)">Etapas (${ne})</div>
          ${etapasHtml||'<div style="color:var(--tx2);font-size:13px;padding:12px 0">Nenhuma etapa cadastrada.</div>'}
        </div>

        <!-- FATO RELEVANTE -->
        <div style="background:var(--bg2);border:1px solid var(--bo);border-radius:var(--r);padding:20px">
          ${fatoHtml}
        </div>`;
    }
  }

  setM(`
    <div class="ph"><div class="pt">Histórico do Projeto</div></div>
    <div class="fbar">
      <select class="flt" style="flex:1;max-width:500px" onchange="_pg.histProj=this.value;PGS.hist()">${opts}</select>
    </div>
    ${detalhe}`);
},

// ── LANÇAMENTOS TÉCNICO ──
async function salvarLH(){
  const msg=document.getElementById('lmsg');
  const pid=v('lp'),desc=v('lde').trim();
  if(!desc){msg.textContent='Informe a descrição.';msg.style.color='var(--red)';msg.style.display='block';return}
  msg.textContent='Salvando...';msg.style.color='var(--tx2)';msg.style.display='block';
  try{
    const p=window._lhP.find(x=>String(x['ID'])===String(pid));
    if(p)await sUpd(SH.g,'Cadastro_Projetos',`${cl(43)}${p._row}:${cl(49)}${p._row}`,[[USR['Nome'],v('lt'),desc,v('ld'),'0',v('lh2')||'0',p['NOME OBRA']||'']]);
    ntf('Lançamento registrado!');msg.textContent='✓ Salvo com sucesso!';msg.style.color='var(--vd)';
    document.getElementById('lde').value='';document.getElementById('lh2').value='';
  }catch(e){msg.textContent='Erro ao salvar.';msg.style.color='var(--red)';console.error(e)}
}

function loadEt(){
  const pid=v('aep');if(!pid){document.getElementById('aeet').innerHTML='';return}
  const p=window._aeP.find(x=>String(x['ID'])===String(pid));if(!p)return;
  const ne=parseInt(p['QUANTIDADE ETAPAS'])||0;
  let h='<div style="margin-top:14px">';
  for(let i=1;i<=ne;i++){
    const nm=p[`ETAPA ${i}`]||`Etapa ${i}`,st=p[`STATUS E${i}`]||'Não Iniciado',pr2=p[`PRAZO E${i}`]||'—',de=p[`DESCRIÇÃO E${i}`]||'';
    h+=`<div style="padding:12px 0;border-bottom:1px solid var(--bo)"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px"><div><div style="font-size:13px;font-weight:600">${nm}</div><div style="font-size:10px;color:var(--tx2)">Prazo: ${pr2}</div></div><select id="aes${i}" style="background:var(--bg3);border:1.5px solid var(--bo);color:var(--tx);padding:6px 9px;border-radius:6px;font-size:11px;outline:none;font-family:'Space Grotesk',sans-serif"><option ${st==='Não Iniciado'?'selected':''}>Não Iniciado</option><option ${st==='Em andamento'?'selected':''}>Em andamento</option><option ${st==='Entregue a medir'?'selected':''}>Entregue a medir</option><option ${st==='Concluído'?'selected':''}>Concluído</option><option ${st==='Pausado'?'selected':''}>Pausado</option></select></div>${de?`<div style="font-size:11px;color:var(--tx2);line-height:1.5;background:var(--bg3);padding:7px;border-radius:5px;margin-top:5px">${de.substring(0,200)}${de.length>200?'...':''}</div>`:''}</div>`;
  }
  h+=`</div><button class="btn baz2" style="width:100%;justify-content:center;padding:11px;margin-top:14px" onclick="salvarAE()">Salvar Alterações</button>`;
  document.getElementById('aeet').innerHTML=h;window._aeAt=p;
}

async function salvarAE(){
  const msg=document.getElementById('aemsg');
  msg.textContent='Salvando...';msg.style.color='var(--tx2)';msg.style.display='block';
  try{
    const p=window._aeAt,ne=parseInt(p['QUANTIDADE ETAPAS'])||0;
    for(let i=1;i<=ne;i++){const s=document.getElementById(`aes${i}`);if(s)await sUpd(SH.g,'Cadastro_Projetos',`${cl(31+(i-1))}${p._row}`,[[s.value]])}
    delete C[SH.g+'Cadastro_Projetos'];ntf('Etapas atualizadas!');msg.textContent='✓ Atualizado!';msg.style.color='var(--vd)';
  }catch(e){msg.textContent='Erro.';msg.style.color='var(--red)';console.error(e)}
}

async function salvarFR(){
  const msg=document.getElementById('frmsg');
  const desc=v('frde').trim();
  if(!desc){msg.textContent='Informe a descrição.';msg.style.color='var(--red)';msg.style.display='block';return}
  msg.textContent='Salvando...';msg.style.color='var(--tx2)';msg.style.display='block';
  try{
    const p=window._frP.find(x=>String(x['ID'])===String(v('frp')));
    if(p)await sUpd(SH.g,'Cadastro_Projetos',`${cl(43)}${p._row}:${cl(49)}${p._row}`,[[USR['Nome'],v('frt'),desc,v('frd'),'0','0',p['NOME OBRA']||'']]);
    ntf('Fato registrado!');msg.textContent='✓ Registrado!';msg.style.color='var(--vd)';
    document.getElementById('frde').value='';
  }catch(e){msg.textContent='Erro.';msg.style.color='var(--red)';console.error(e)}
}

  confirmar('Excluir Projeto',`Tem certeza que deseja excluir o projeto <strong>${nome}</strong>? Esta ação não pode ser desfeita.`,async()=>{
    try{const sid=await getSheetId(SH.g,'Cadastro_Projetos');await sDel(SH.g,sid,row);delete C[SH.g+'Cadastro_Projetos'];ntf('Projeto excluído!');PGS.proj()}catch(e){ntf('Erro ao excluir.','err');console.error(e)}
  });
}

// ── EMPRESA ──
function novaEmpresa(){document.getElementById('mf-emp').innerHTML=`<div class="mh"><div class="mt2">Nova Empresa</div><button class="mc" onclick="fechar('ov-emp')">×</button></div><div class="mf"><label>Nome / Razão Social</label><input id="en" type="text" placeholder="Ex: Direcional Executivo"></div><div class="mft"><button class="btn bgh" onclick="fechar('ov-emp')">Cancelar</button><button class="btn baz2" onclick="salvEmp()">Salvar</button></div>`;abrir('ov-emp')}
function editEmpresa(row,nome){document.getElementById('mf-emp').innerHTML=`<div class="mh"><div class="mt2">Editar Empresa</div><button class="mc" onclick="fechar('ov-emp')">×</button></div><div class="mf"><label>Nome</label><input id="en" type="text" value="${nome||''}"></div><div class="mft"><button class="btn bgh" onclick="fechar('ov-emp')">Cancelar</button><button class="btn baz2" onclick="salvEmp(${row})">Salvar</button></div>`;abrir('ov-emp')}
async function salvEmp(row){
  const nm=v('en');if(!nm)return;
  try{if(row){await sUpd(SH.g,'Cadastro_Empresas',`B${row}`,[[nm]])}else{const id=await nxtId(SH.g,'Cadastro_Empresas','ID');await sApp(SH.g,'Cadastro_Empresas',[[id,nm]])}
  fechar('ov-emp');ntf('Empresa salva!');PGS.emp()}catch(e){ntf('Erro.','err');console.error(e)}
}

// ── PROPOSTA ──
async function novaProposta(){const re=await sGet(SH.g,'Cadastro_Empresas');_mProp(r2o(re).filter(e=>e['Cliente']),null)}
async function editPropData(row){
  const re=await sGet(SH.g,'Cadastro_Empresas');
  const rows=await sGet(SH.g,'Cadastro_Propostas');
  const p=r2o(rows).find(x=>x._row===row);
  _mProp(r2o(re).filter(e=>e['Cliente']),p);
}
function _mProp(emps,p){
  const eo=emps.map(e=>`<option ${p&&e['Cliente']===p['Empresa']?'selected':''}>${e['Cliente']}</option>`).join('');
  document.getElementById('mf-prop').innerHTML=`<div class="mh"><div class="mt2">${p?'Editar':'Nova'} Proposta</div><button class="mc" onclick="fechar('ov-prop')">×</button></div>
  <div class="mg"><div class="mf"><label>Empresa</label><select id="ppe">${eo}</select></div><div class="mf"><label>Nome da Obra</label><input id="ppo" type="text" value="${p?p['Nome da Obra']||'':''}" placeholder="Ex: 519CC"></div></div>
  <div class="mf"><label>Número da Proposta</label><input id="ppn" type="text" value="${p?p['Número da Proposta']||'':''}" placeholder="PRH_001_26_DIR_519CC"></div>
  <div class="mf"><label>Descrição</label><textarea id="ppd" rows="3">${p?p['Descrição']||'':''}</textarea></div>
  <div class="mg"><div class="mf"><label>Contato</label><input id="ppc" type="text" value="${p?p['Contato']||'':''}"></div><div class="mf"><label>Área total (m²)</label><input id="ppa" type="number" value="${p?p['Área']||'':''}" step="0.01"></div></div>
  <div class="mg"><div class="mf"><label>Valor (R$)</label><input id="ppv" type="number" value="${p?p['Valor']||'':''}" step="0.01"></div><div class="mf"><label>Status</label><select id="pps"><option ${!p||p['Status']==='Pendente'?'selected':''}>Pendente</option><option ${p&&p['Status']==='Aceita'?'selected':''}>Aceita</option><option ${p&&p['Status']==='Rejeitada'?'selected':''}>Rejeitada</option></select></div></div>
  <div class="mf"><label>Motivo (se rejeitada)</label><input id="ppm" type="text" value="${p?p['Motivo']||'':''}"></div>
  <div class="mft"><button class="btn bgh" onclick="fechar('ov-prop')">Cancelar</button><button class="btn baz2" onclick="salvProp(${p?p._row:'null'})">Salvar</button></div>`;
  abrir('ov-prop');
}
async function salvProp(row){
  const vals=[v('ppe'),v('ppo'),v('ppd'),v('ppc'),v('ppv')||0,v('pps'),v('ppm'),v('ppn'),v('ppa')||0];
  try{if(row&&row!=='null'){await sUpd(SH.g,'Cadastro_Propostas',`B${row}:J${row}`,[vals])}else{const id=await nxtId(SH.g,'Cadastro_Propostas','ID');await sApp(SH.g,'Cadastro_Propostas',[[id,...vals]])}
  fechar('ov-prop');ntf('Proposta salva!');PGS.prop()}catch(e){ntf('Erro.','err');console.error(e)}
}

// ── PROJETO ──
async function novoProjeto(){
  const[re,rpr,ru]=await Promise.all([sGet(SH.g,'Cadastro_Empresas'),sGet(SH.g,'Cadastro_Propostas'),sGet(SH.g,'Cadastro_Usuarios')]);
  _mProj(r2o(re).filter(e=>e['Cliente']),r2o(rpr),r2o(ru),null);
}
async function editProjData(row){
  const[re,rpr,ru,rp]=await Promise.all([sGet(SH.g,'Cadastro_Empresas'),sGet(SH.g,'Cadastro_Propostas'),sGet(SH.g,'Cadastro_Usuarios'),sGet(SH.g,'Cadastro_Projetos')]);
  const p=r2o(rp).find(x=>x._row===row);
  _mProj(r2o(re).filter(e=>e['Cliente']),r2o(rpr),r2o(ru),p);
}
function _mProj(emps,props,users,p){
  const ne=p?parseInt(p['QUANTIDADE ETAPAS'])||1:1;
  const eo=emps.map(e=>`<option ${p&&e['Cliente']===p['EMPRESA']?'selected':''}>${e['Cliente']}</option>`).join('');
  const pro=props.map(x=>`<option ${p&&x['Número da Proposta']===p['NÚMERO PROPOSTA']?'selected':''}>${x['Número da Proposta']}</option>`).join('');
  const uo=users.map(u=>`<option ${p&&u['Nome']===(p['COORDENADOR ']||'').trim()?'selected':''}>${u['Nome']}</option>`).join('');
  let etH='<div class="fsec">Etapas do Projeto</div>';
  for(let i=1;i<=6;i++){etH+=`<div id="eb${i}" style="${i<=ne?'':'display:none'}"><div style="font-size:11px;color:var(--az);font-weight:700;margin:8px 0 5px">Etapa ${i}</div><div class="mg"><div class="mf"><label>Nome</label><input id="en${i}" type="text" value="${p?p[`ETAPA ${i}`]||'':''}" placeholder="Ex: AP: Anteprojeto"></div><div class="mf"><label>Prazo</label><input id="ep${i}" type="text" value="${p?p[`PRAZO E${i}`]||'':''}" placeholder="Ex: 15 dias"></div></div><div class="mg"><div class="mf"><label>Valor (R$)</label><input id="ev${i}" type="number" value="${p?p[`VALOR E${i}`]||'':''}" step="0.01"></div><div class="mf"><label>Status</label><select id="es${i}"><option ${!p||p[`STATUS E${i}`]==='Não Iniciado'?'selected':''}>Não Iniciado</option><option ${p&&p[`STATUS E${i}`]==='Em andamento'?'selected':''}>Em andamento</option><option ${p&&p[`STATUS E${i}`]==='Entregue a medir'?'selected':''}>Entregue a medir</option><option ${p&&p[`STATUS E${i}`]==='Concluído'?'selected':''}>Concluído</option></select></div></div><div class="mf"><label>Descrição</label><textarea id="ed${i}" rows="2">${p?p[`DESCRIÇÃO E${i}`]||'':''}</textarea></div></div>`}
  document.getElementById('mf-proj').innerHTML=`<div class="mh"><div class="mt2">${p?'Editar Projeto':'Novo Projeto'}</div><button class="mc" onclick="fechar('ov-proj')">×</button></div>
  <div class="fsec">Dados Gerais</div>
  <div class="mg"><div class="mf"><label>Empresa</label><select id="prp">${eo}</select></div><div class="mf"><label>Nome da Obra</label><input id="pro" type="text" value="${p?p['NOME OBRA']||'':''}" placeholder="Ex: 486-01"></div></div>
  <div class="mg"><div class="mf"><label>Proposta vinculada</label><select id="prpr"><option value="">—</option>${pro}</select></div><div class="mf"><label>Coordenador Hyzi</label><select id="prc"><option value="">—</option>${uo}</select></div></div>
  <div class="mf"><label>Coordenador do Cliente</label><input id="prcc" type="text" value="${p?p['COORDEADOR CLIENTE']||'':''}" placeholder="Nome do coord. cliente"></div>
  <div class="mf"><label>Descrição / Escopo</label><textarea id="prd" rows="3">${p?p['DESCRIÇÃO']||'':''}</textarea></div>
  <div class="mg"><div class="mf"><label>Data início</label><input id="pri" type="date" value="${p&&p['DATA INÍCIO']?String(p['DATA INÍCIO']).split('T')[0]:''}"></div><div class="mf"><label>Data entrega</label><input id="prf" type="date" value="${p&&p['DATA FIM']?String(p['DATA FIM']).split('T')[0]:''}"></div></div>
  <div class="mg"><div class="mf"><label>Status geral</label><select id="prst"><option ${!p||p['STATUS GERAL ']==='Não iniciado'?'selected':''}>Não iniciado</option><option ${p&&(p['STATUS GERAL']||p['STATUS GERAL '])==='Em andamento'?'selected':''}>Em andamento</option><option ${p&&(p['STATUS GERAL']||p['STATUS GERAL '])==='Concluído'?'selected':''}>Concluído</option><option ${p&&(p['STATUS GERAL']||p['STATUS GERAL '])==='Paralizado'?'selected':''}>Paralizado</option></select></div><div class="mf"><label>Qtd etapas</label><select id="prne" onchange="togEt(this.value)">${[1,2,3,4,5,6].map(n=>`<option ${n===ne?'selected':''}>${n}</option>`).join('')}</select></div></div>
  <div class="mg"><div class="mf"><label>Valor total (R$)</label><input id="prv" type="number" value="${p?p['VALOR']||'':''}" step="0.01"></div><div class="mf"><label>Forma de pagamento</label><input id="prpg" type="text" value="${p?p['FORMA PAGTO']||'':''}" placeholder="80% entrega + 20% aprovação"></div></div>
  ${etH}
  <div class="mft"><button class="btn bgh" onclick="fechar('ov-proj')">Cancelar</button><button class="btn baz2" onclick="salvProj(${p?p._row:'null'})">Salvar Projeto</button></div>`;
  window._ep=p;abrir('ov-proj');
}
function togEt(n){for(let i=1;i<=6;i++){const el=document.getElementById(`eb${i}`);if(el)el.style.display=i<=parseInt(n)?'':'none'}}
async function salvProj(row){
  const ne=parseInt(v('prne'))||1;
  const vals=[v('prp'),v('prpr'),v('prd'),v('pro'),v('pri'),v('prf'),v('prst'),v('prcc'),v('prc'),v('prpg'),ne,v('prv')||0];
  for(let i=1;i<=6;i++)vals.push(v(`en${i}`));
  for(let i=1;i<=6;i++)vals.push(v(`ed${i}`));
  for(let i=1;i<=6;i++)vals.push(v(`ev${i}`)||0);
  for(let i=1;i<=6;i++)vals.push(v(`es${i}`));
  for(let i=1;i<=6;i++)vals.push(v(`ep${i}`));
  try{
    if(row&&row!=='null'){await sUpd(SH.g,'Cadastro_Projetos',`B${row}:AM${row}`,[vals])}
    else{const id=await nxtId(SH.g,'Cadastro_Projetos','ID');await sApp(SH.g,'Cadastro_Projetos',[[id,...vals]])}
    fechar('ov-proj');ntf('Projeto salvo!');PGS.proj();
  }catch(e){ntf('Erro ao salvar.','err');console.error(e)}
}

// ── USUÁRIO ──
function novoUsuario(){document.getElementById('mf-usr').innerHTML=`<div class="mh"><div class="mt2">Novo Usuário</div><button class="mc" onclick="fechar('ov-usr')">×</button></div><div class="mg"><div class="mf"><label>Nome completo</label><input id="unn" type="text"></div><div class="mf"><label>E-mail</label><input id="une" type="email"></div></div><div class="mg"><div class="mf"><label>Telefone</label><input id="unt" type="text"></div><div class="mf"><label>Data entrada</label><input id="und" type="date" value="${td()}"></div></div><div class="mg"><div class="mf"><label>R$/hora técnica</label><input id="unh" type="number" step="0.01"></div><div class="mf"><label>Senha de acesso</label><input id="uns" type="text"></div></div><div class="mf"><label>Endereço</label><input id="unad" type="text"></div><div class="mft"><button class="btn bgh" onclick="fechar('ov-usr')">Cancelar</button><button class="btn baz2" onclick="salvUsr()">Salvar</button></div>`;abrir('ov-usr')}
async function editUsrData(row){
  const rows=await sGet(SH.g,'Cadastro_Usuarios');
  const u=r2o(rows).find(x=>x._row===row);
  if(!u)return;
  document.getElementById('mf-usr').innerHTML=`<div class="mh"><div class="mt2">Editar Usuário</div><button class="mc" onclick="fechar('ov-usr')">×</button></div><div class="mg"><div class="mf"><label>Nome completo</label><input id="unn" type="text" value="${u['Nome']||''}"></div><div class="mf"><label>E-mail</label><input id="une" type="email" value="${u['E-mail']||''}"></div></div><div class="mg"><div class="mf"><label>Telefone</label><input id="unt" type="text" value="${u['Telefone']||''}"></div><div class="mf"><label>Data entrada</label><input id="und" type="date" value="${u['Data Entrada']?String(u['Data Entrada']).split('T')[0]:''}"></div></div><div class="mg"><div class="mf"><label>R$/hora técnica</label><input id="unh" type="number" value="${u['Valor Hora Técnica']||0}" step="0.01"></div><div class="mf"><label>Senha</label><input id="uns" type="text" value="${u['Senha']||''}"></div></div><div class="mf"><label>Endereço</label><input id="unad" type="text" value="${u['Endereço']||''}"></div><div class="mft"><button class="btn bgh" onclick="fechar('ov-usr')">Cancelar</button><button class="btn baz2" onclick="salvUsr(${row})">Salvar</button></div>`;
  abrir('ov-usr');
}
async function salvUsr(row){
  const vals=[v('unn'),v('une'),v('unt'),v('unad'),v('und'),v('unh')||0,v('uns')];
  try{if(row){await sUpd(SH.g,'Cadastro_Usuarios',`B${row}:H${row}`,[vals])}else{const id=await nxtId(SH.g,'Cadastro_Usuarios','ID Usuário');await sApp(SH.g,'Cadastro_Usuarios',[[id,...vals]])}
  fechar('ov-usr');ntf('Usuário salvo!');PGS.eq()}catch(e){ntf('Erro.','err');console.error(e)}
}
